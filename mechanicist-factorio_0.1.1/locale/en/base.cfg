logistic-science-pack=Compiles logistics doctrine for belts, inserters, and movement discipline.
military-science-pack=Compiles militant doctrine for perimeter correction and defensive escalation.
chemical-science-pack=Compiles alchemical doctrine for fluid handling, oil processing, and chemical production.
production-science-pack=Compiles manufactorum doctrine for scale, modules, rails, and larger industrial burdens.
utility-science-pack=Compiles omni-utility doctrine for high-order infrastructure and expensive late-industrial systems.
space-science-pack=Retrieves void doctrine from orbital achievement and converts it into research permission.


