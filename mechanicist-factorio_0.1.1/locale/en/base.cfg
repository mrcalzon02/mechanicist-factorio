advanced-circuit=Assembles red-seal logic circuits from plastic, copper, and low-order wafers.
processing-unit=Assembles a cogitator-grade core from advanced circuits, logic wafers, and alchemical acid handling.
engine-unit=Assembles a combustion drive heart from steel, pipework, and rotating components.
electric-engine-unit=Upgrades a combustion drive heart into an electrically obedient motion unit.
battery=Assembles a galvanic charge cell from metals and acid so energy may be stored until demanded.
plastic-bar=Processes petrochemical vapor into polymer stock for advanced industry.
sulfur=Precipitates useful sulfur from petrochemical processing.
explosives=Mixes volatile components into sanctioned detonation compound.
