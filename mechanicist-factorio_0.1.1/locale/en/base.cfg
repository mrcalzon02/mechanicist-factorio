automation=Authorizes the first assembly altars and begins the sacred transition from hand labor to machine obedience.
logistics=Improves the movement of matter through belts, inserters, and the blessed denial of manual hauling.
steel-processing=Disciplines iron into steel, unlocking stronger structures and less embarrassing machinery.
electronics=Introduces low-order logic wafers for machines requiring controlled decision-like behavior.
advanced-electronics=Authorizes more capable circuits for systems that must process complexity without developing opinions.
oil-processing=Unlocks petrochemical separation, fluid burdens, and the long spiritual decline of the pipe network.
chemical-science-pack=Authorizes alchemical doctrine packs for research paths involving fluids, reactions, and advanced processing.
military=Begins formal hostile-environment correction doctrine.
advanced-material-processing=Improves furnace technology and the thermal rites of bulk material obedience.
robotics=Introduces airborne servitor systems for construction, logistics, and the slow erosion of personal responsibility.
construction-robotics=Authorizes construction servitors to repair, build, and obey blueprints without complaint.
logistic-robotics=Authorizes logistic servitors to move goods through the air as though belts had personally offended them.
rocket-silo=Authorizes the final planetary launch structure, a cathedral of fuel, steel, and expensive intent.
space-science-pack=Authorizes the extraction of doctrine from orbital achievement and the void-facing continuation of industry.


