[mechanicist-heresy.item-description]
iron-plate=A stamped shard of obedient iron, accepted by the machine-spirits only after heat, pressure, and sufficient industrial suffering.
copper-plate=A reddish plate of sanctioned conductivity, beloved by circuits and distrusted by anyone who has seen the wire budget.
steel-plate=Iron that has survived enough thermal correction to be trusted with heavier sins.
stone-brick=A rectified masonry slab for imposing geometry upon mud, chaos, and the shameful informality of natural terrain.
iron-gear-wheel=A toothed ferric relic whose purpose is to bite other components at approved rotational intervals.
copper-cable=A blessed nerve-strand through which electrons march in anxious obedience to the factory's will.
electronic-circuit=A green-lit sliver of permitted thought, too stupid to rebel and therefore ideal for mass deployment.
advanced-circuit=A red circuit of suspicious capability, permitted to process complexity under strict doctrinal supervision.
processing-unit=A blue core of dangerous competence. Install only where the work demands calculation and the operator accepts the theological risk.
engine-unit=A combustion heart that converts contained violence into motion, noise, and the illusion of control.
electric-engine-unit=A silent galvanic motion heart for machines too refined to cough openly but not too refined to consume power.
battery=A portable reliquary of caged lightning. Do not ask whether it is patient.
plastic-bar=A smooth petrochemical ingot proving that oil can be made solid, useful, and spiritually worse.
sulfur=A yellow alchemical sin-matter used where chemistry becomes corrosive, explosive, or administratively necessary.
explosives=A sanctioned detonation compound for converting obstacles into anecdotes and enemies into inventory pressure.
automation-science-pack=A consumable packet of bureaucratically approved machine prayer authorizing the factory to stop doing things by hand.
logistic-science-pack=Doctrine for belts, inserters, and the industrial miracle of moving problems somewhere else.
military-science-pack=A compact devotional excuse for bullets, walls, explosives, and all other forms of diplomatic compression.
chemical-science-pack=A fluid-adjacent research offering proving that pipes, oil, and bad planning are one continuous sacrament.
production-science-pack=A doctrine pack consumed to justify more machines, larger machines, and the sacred conversion of landscape into throughput.
utility-science-pack=A high-order doctrine packet authorizing grand infrastructure, severe material consumption, and luxuries disguised as necessities.
space-science-pack=A research relic extracted from orbital arrogance and returned to the surface as proof that the factory's appetite has left the planet.


