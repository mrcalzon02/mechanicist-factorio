[mechanicist-heresy.recipe-description]
iron-plate=Forces ore through sufficient heat to produce a stamped ferric confession suitable for obedient industry.
copper-plate=Smelts copper ore into sanctioned conductive stock, because even electrons require a corridor.
steel-plate=Thermally disciplines iron until it becomes strong enough to participate in larger mistakes.
stone-brick=Fires stone into civic obedience slabs so the factory may impose right angles upon the world.
iron-gear-wheel=Manufactures toothed ferric relics for machines that express faith through rotation.
copper-cable=Draws copper into blessed nerve-strands through which the factory's anxious will may travel.
electronic-circuit=Assembles a lesser permitted thought-wafer from copper, iron, and strict limits on imagination.
advanced-circuit=Assembles a crimson cogitation relic whose competence is worrying but currently profitable.
processing-unit=Binds advanced circuits, lesser wafers, and acid rites into a blue reliquary of dangerous calculation.
engine-unit=Assembles a combustion heart by caging rotational violence inside steel and pipework.
electric-engine-unit=Consecrates a motion heart for galvanic service, replacing flame with quieter obedience.
battery=Builds a container for imprisoned lightning and labels the result infrastructure.
plastic-bar=Extrudes refined petrochemical regret into smooth polymer stock for advanced industry.
sulfur=Precipitates yellow sin-matter from petrochemical processing for further alchemical misconduct.
explosives=Ordains volatile components into a compound that corrects terrain, enemies, and planning failures.
automation-science-pack=Compiles the red litany proving that flesh was never the correct long-term crafting solution.
logistic-science-pack=Compiles the green litany by which matter is belted, inserted, and relocated from one problem into another.
military-science-pack=Compiles the black litany authorizing the factory to answer teeth, claws, and diplomacy with ammunition.
chemical-science-pack=Compiles the blue litany proving that refinery outputs, pipes, and regret form a single sacrament.
production-science-pack=Compiles the purple litany by which industry becomes architecture and architecture becomes appetite.
utility-science-pack=Compiles the golden litany that transforms expensive infrastructure into moral inevitability.
space-science-pack=Retrieves white voidborne compliance from orbital triumph and feeds it back into terrestrial hunger.


