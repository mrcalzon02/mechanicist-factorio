[mechanicist-heresy.technology-description]
automation=The founding doctrine by which hand labor is demoted and the machine is permitted to inherit the work.
logistics=A doctrine proving that any object, if sufficiently belted, inserted, and ignored, can become someone else's problem.
steel-processing=Authorizes the repeated punishment of iron until it becomes useful enough to be called steel.
electronics=Allows primitive cogitation under strict limits, because a factory without circuits is merely a pile of regret.
advanced-electronics=Permits machines to think slightly harder, provided everyone agrees not to discuss the implications.
oil-processing=Authorizes the extraction, boiling, cracking, and moral degradation of buried petrochemical sins.
chemical-science-pack=Sanctions the use of alchemical doctrine packs for pipe networks, acids, plastics, and the refinery's expanding crimes.
military=Formalizes the doctrine that hostile biomass may be corrected through walls, ammunition, explosives, and sufficient perimeter anxiety.
advanced-material-processing=Improves the furnace-caskets so raw matter may be punished faster, hotter, and with fewer visible objections.
robotics=Introduces airborne machine-servitors, thereby replacing human inconvenience with charger placement problems.
construction-robotics=Permits construction servitors to obey blueprints, repair damage, and make the operator look more organized than they are.
logistic-robotics=Permits logistic servitors to haul matter through the air, because sometimes belts have not yet suffered enough.
rocket-silo=A colossal shrine of thrust, doctrine, and budgetary violence by which the factory announces that one planet was insufficient.
space-science-pack=Authorizes the conversion of orbital arrogance into research doctrine, proving the factory's appetite has become void-capable.

