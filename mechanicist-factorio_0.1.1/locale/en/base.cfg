[mechanicist-standard.entity-description]
assembling-machine-1=A crude manufactorum altar where raw matter is persuaded into obedient industrial form.
assembling-machine-2=A reinforced assembly altar with improved rites, better tolerances, and fewer openly smoking bearings.
assembling-machine-3=A high-order fabrication shrine for components that have survived enough prayers to deserve throughput.
burner-mining-drill=A fuel-fed extraction shrine that gnaws the earth while coughing smoke in praise of productivity.
electric-mining-drill=An electrified extraction shrine that strips ore from the ground with more discipline and less visible desperation.
stone-furnace=A primitive reliquary of heat, smoke, and acceptable metallurgical superstition.
steel-furnace=A hardened furnace-casket for faster smelting under improved doctrinal insulation.
electric-furnace=A sanctified electro-furnace that replaces open flame with obedient current and machine-approved heat.
lab=A chapel of analysis where offerings of research are consumed until the factory receives permission to become worse.
boiler=A pressure vessel that converts water and fuel into obedient steam under minimal theological supervision.
steam-engine=A blessed dynamo that turns pressure, heat, and turbine obedience into useful power.
chemical-plant=A process shrine for fluids, reagents, and the less publicly celebrated branches of industrial faith.
oil-refinery=A distillation basilica that separates crude oil into useful fractions and enduring moral liability.
radar=An auspex vigil tower that watches the horizon for resources, enemies, and disappointing strategic decisions.
roboport=A docking reliquary for logistic servitors, construction drones, and the tiny airborne instruments of factory will.


