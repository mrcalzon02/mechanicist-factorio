page_mechanicist-factorio_text_1=Mechanicist Factorio is a thematic conversion layer for Factorio. In plain terms, it changes the visible language of the base game so the factory feels like a grim manufactorum, a machine-cult industrial shrine, and a bureaucratic war economy administered by people who believe every belt requires paperwork, every furnace requires prayer, and every shortage is evidence of moral weakness.\n\nThe mod does not intend to destroy vanilla compatibility. A plate may be called a sanctified ferric ration on screen, but underneath it remains iron-plate. An assembler may be addressed as a sub-altar of sanctioned fabrication, but beneath the incense it remains assembling-machine-1. That boring internal stability is not a lack of imagination. It is the skeleton that lets other mods continue to function.\n\nAt the current stage, Mechanicist Factorio is primarily a language, settings, and compatibility test. It establishes the English locale structure, startup settings, intensity switching, menu language, and an Informatron tree. Future builds may expand recipe requirements, alter research progression, patch Space Age and Quality text, add optional compatibility logic, and introduce new Mechanist intermediates.\n\nThe doctrine is simple: the surface may become devotional, absurd, grim, bureaucratic, and soaked in sacred machine oil. The internal keys should remain stable, boring, and compatible.

page_mechanicist-overview_text_1=Mechanicist Factorio turns the ordinary Factorio experience into a darker machine-cult industrial campaign. Items, machines, fluids, recipes, technologies, interface text, and guide material can be renamed and redescribed through the mod’s locale and settings structure.\n\nThe mod is not trying to make Factorio unrecognizable under the hood. It is trying to make the same familiar game feel like it has been processed through a brutal manufactorum bureaucracy. You still mine ore, smelt plates, automate recipes, research technologies, defend the factory, process oil, build trains, launch rockets, and expand until the planet has been thoroughly explained to by conveyor belt. The difference is tone. The factory is no longer merely efficient. It is doctrinally obedient.\n\nThe mod currently focuses on three ideas. First, visible text should be rethemed. Second, the underlying vanilla keys should remain intact. Third, recipe and technology changes should be applied carefully so the mod can coexist with other mods whenever possible.\n\nIf the language intensity is set to Off, the mod should stay quiet where supported. If it is set to Standard Mechanist, the game receives a readable industrial-machine-cult tone. If it is set to Full Heresy, every tooltip is permitted to sound as though a Tech-Priest has been locked in a filing cabinet with a thesaurus, a red candle, and a malfunctioning servo-skull.

page_mechanicist-settings_text_1=Mechanicist Factorio is controlled mainly through startup settings. These settings exist so the player can decide how much of the world should be translated into the Mechanist tone.\n\nLanguage Intensity controls how much visible language is changed. Off attempts to leave prototype names and descriptions alone where supported. Standard Mechanist uses readable industrial language. Full Heresy uses maximum devotional absurdity, machine-cult warnings, exaggerated bureaucracy, and Tech-Priest sermonizing.\n\nRename Vanilla controls whether the base game receives Mechanist names and descriptions. This is the main switch for turning the core retheme on or off.\n\nRename Space Age controls whether the Space Age expansion receives the same treatment. When enabled, planets, platforms, space logistics, and advanced materials can be described as forge worlds, void reliquaries, xeno-biological failures, and cryogenic shrines of regret.\n\nRename Quality controls whether the Quality mod receives sanctification language. Quality becomes inspection, certification, relic-grade output, and machine-spirit approval.\n\nEnable QoL Integrations is reserved for optional compatibility patches. The goal is to avoid breaking quality-of-life mods while still letting Mechanicist Factorio speak to them when it can do so safely.\n\nPreserve Vanilla Search Terms is important. If enabled, descriptions can retain familiar words such as iron plate, gear, circuit, assembler, furnace, and lab. This matters because a player should not need a theological education to find a belt.
page_mechanicist-settings_text_2=Verbose Descriptions is for players who want more explanation and more atmosphere.\n\nDebug Locale Audit is for later development work. It may eventually report missing entries, skipped prototypes, and incomplete retheme coverage.

page_mechanicist-compat_text_1=The most important rule of Mechanicist Factorio is this: player-facing language may change, but internal prototype keys should remain stable wherever possible.\n\nThis distinction matters because Factorio mods often depend on internal names. A compatibility patch may search for electronic-circuit. A recipe may require iron-gear-wheel. A technology adjustment may expect automation to exist. If Mechanicist Factorio destructively renames those internal keys, it creates unnecessary breakage.\n\nTherefore, the mod should prefer localization changes, prototype localised_name assignments, recipe adjustments, technology prerequisite edits, and carefully guarded patches. It should avoid destructive replacement unless the replacement is intentional, documented, and compatibility-aware.\n\nTotal conversion mods and post-processing mods may not coexist safely with Mechanicist Factorio if they rewrite the same technology tree, research ingredients, or progression assumptions. That is why some overhaul mods are marked incompatible. Bob-style expansion mods, however, are not automatically enemies. Mods that mostly add new materials, machines, enemies, and recipe chains while preserving vanilla references may be future compatibility targets.\n\nThe machine may wear a red robe. It should still answer to its original serial number.

page_mechanicist-roadmap_text_1=The first stage is the language shell. This includes metadata, settings, English locale files, menu text, Informatron pages, and startup intensity behavior.\n\nThe second stage is vanilla prototype coverage. This means assigning standard and heresy names to common items, entities, recipes, technologies, fluids, equipment, weapons, ammo, modules, rails, robots, nuclear systems, and late-game infrastructure.\n\nThe third stage is expansion support. Space Age and Quality receive separate locale files and optional prototype assignments. The goal is to make those systems feel like part of the same machine-cult doctrine without breaking their functionality.\n\nThe fourth stage is progression work. This is where the mod may begin changing requirements, moving technologies around, adding new intermediate bureaucratic or manufactorum steps, and making the game feel more like an industrial war economy.\n\nThe fifth stage is compatibility support. Specific mods can receive conditional patches if they are common, useful, and not fundamentally opposed to Mechanicist Factorio’s progression logic.\n\nThe sixth stage is polish: missing localization, search usability, Informatron cleanup, balance review, and testing across common mod combinations.

page_mechanicist-loop_text_1=Factorio is built on a sacred loop so simple that even an exhausted enginseer with three hours of sleep and a pocket full of loose bolts can understand it.\n\nYou need resources. You build machines to gather resources. You build machines to process resources. You build machines to craft machines. Those machines allow you to research better machines. Better machines consume more resources, which forces you to expand, defend, organize, and automate again.\n\nIn Mechanist terms, this is the Litany of Expanding Obligation.\n\nFirst, the earth is interrogated by drills. Ore is extracted under protest. Second, the ore is purified by furnaces and converted into plates. Third, plates become gears, circuits, belts, inserters, ammunition, assemblers, science packs, engines, rails, pipes, and eventually everything else that matters. Fourth, science packs are fed into labs so the factory may remember how to become more dangerous. Fifth, every improvement creates new hunger.\n\nThe factory does not become complete. It becomes capable of demanding more.\n\nIf you are confused, return to the loop. Ask yourself: what am I short of? Can it be mined, smelted, crafted, transported, researched, defended, or automated? If yes, obey the loop. If no, you are probably looking at oil.

page_mechanicist-first-ten_text_1=Upon crashfall, do not panic. Panic is an inefficient use of oxygen and is not listed on the approved production chain.\n\nYour first task is to establish the minimum viable shrine of industry. Find iron ore, copper ore, coal, stone, and water. These are the first five confessions of the planet. You will extract them.\n\nBegin by mining stone so you can create a furnace. Mine coal or harvest wood for fuel. Place a burner mining drill on iron ore and feed it fuel. Place a furnace in front of the drill so the ore enters directly. The first iron plate is not merely a plate. It is the opening syllable of the manufactorum hymn.\n\nRepeat this for copper. Add more burner drills. Add more furnaces. Feed them coal. If you must hand-feed everything at first, endure it. The early game is punishment for not yet having earned automation.\n\nCraft belts and inserters as soon as possible. Belts move material. Inserters perform the sacred grasp. Together they reduce the amount of time you spend walking around like an underfunded servitor with no task priority.\n\nYour first major goal is electricity. Build an offshore pump, boiler, and steam engine. Connect them with pipes and power poles. Feed the boiler fuel. If the steam engine turns, the machine has inhaled.\n\nYour second major goal is automation. Build labs. Craft automation science packs. Research Automation. The moment you build assembling machines, you begin to escape the shame of hand crafting.
page_mechanicist-first-ten_text_2=The first ten minutes should end with iron smelting, copper smelting, basic power, at least one lab, and the beginning of automated science. If you have achieved this, the founding rite has not failed. If you have not, apply more coal and less hesitation.

page_mechanicist-mining_text_1=Mining is the first act of industrial faith. The planet contains resources in an undisciplined state. Ore in the ground is possibility. Ore on a belt is compliance.\n\nBurner mining drills are crude, hungry, and disrespectful to logistics, but they are enough to begin. Electric mining drills are the first sign that the factory has developed expectations. Place drills over ore patches. Feed their output onto belts. Route those belts to furnaces. Give the furnaces fuel or electricity depending on furnace type. Extract plates.\n\nDo not underestimate scale. One furnace is a candle. Ten furnaces are a chapel. Forty-eight furnaces begin to resemble doctrine.\n\nIron is needed constantly. Copper becomes increasingly important as circuits grow. Stone becomes bricks, furnaces, rails, walls, concrete, and the foundation of larger works. Coal feeds early power, furnaces, plastic, explosives, and the general mood of industrial civilization.\n\nSmelting columns should be planned with expansion in mind. Leave room for more furnaces, more belts, and more input lanes. A cramped starter base is acceptable. A cramped permanent base is a confession of planning failure.\n\nIf production stalls, inspect the chain. Are drills producing? Are belts backed up? Are inserters powered? Are furnaces fueled? Are outputs blocked? Every machine has a reason for disobedience. Find it, correct it, and record the failure in the appropriate imaginary ledger.

page_mechanicist-power_text_1=Electricity is the breath of the machine. Without it, your factory is a collection of expensive rocks arranged by optimism.\n\nThe first power system is simple. Place an offshore pump on water. Pipe water into boilers. Feed boilers with coal. Connect boilers to steam engines. Place power poles so the engines can distribute electricity to drills, inserters, labs, assemblers, and later every device that makes your situation more complicated.\n\nA common early mistake is underfeeding boilers. Boilers do not run on faith alone. They require fuel. Coal belts should be routed to the boiler line and inserted automatically. Hand-feeding power is a temporary humiliation, not a long-term strategy.\n\nWatch your electrical satisfaction. If demand exceeds production, machines slow down. If machines slow down, production drops. If production drops, shortages appear. If shortages appear, you will blame the factory. This is heresy. Blame the power grid.\n\nEventually you may add solar panels and accumulators. Solar is clean, silent, and space-hungry. Accumulators store power for night. Nuclear power arrives later and should be treated with respect, suspicion, and enough heat exchangers to avoid turning your base into a monument to poor ratios.\n\nThe machine must breathe. Build enough lungs.

page_mechanicist-automation_text_1=Automation is the central sacrament of Factorio. Anything you craft repeatedly by hand is a task begging to be mechanized. The player is not a worker. The player is a planning error with legs until assemblers are installed.\n\nResearch Automation early. Build assembling machines. Start with simple recipes: gears, belts, inserters, circuits, pipes, ammunition, and science packs. These are the bones and nerves of the factory.\n\nAn assembler needs inputs and an output. Inserters move items in and out. Belts carry items between machines. Power poles provide electricity. If the machine is missing ingredients, trace the belt backward. If it has ingredients but does nothing, check the recipe. If it has a recipe but no power, place poles. If it has output blocked, clear the output belt or chest. Most factory problems are not mysteries. They are accusations.\n\nThe goal is not merely to automate advanced items. The goal is to automate the things used to automate. Belts should be automated. Inserters should be automated. Assemblers should be automated. Power poles should be automated. Ammo should be automated. Science should be automated. The factory should become capable of building the tools that build the factory.\n\nOnce you understand this, your role changes. You no longer craft objects. You design systems that produce obedience.

page_mechanicist-logistics_text_1=A belt is not merely a strip of moving material. It is a commandment: go there.\n\nBelts move items. Inserters move items between belts, machines, chests, trains, and other containers. Splitters divide or filter lanes. Underground belts allow lines to cross without immediate moral collapse. Together, these tools form the visible nervous system of the factory.\n\nLearn belt lanes early. A belt has two sides. Inserters can place onto the far side or near side depending on arrangement. Machines can consume from both sides. A single belt can carry two different items if managed carefully. This is useful for science production, furnace inputs, and compact assembly lines.\n\nDo not let spaghetti frighten you. Spaghetti is the natural larval state of all factories. The sin is not spaghetti. The sin is refusing to improve it once it becomes unmaintainable.\n\nMain buses, modular cells, rail-fed factories, and city blocks are all ways of imposing order on motion. A main bus carries common materials in parallel lines through a central corridor. Modular cells isolate production blocks. Rail bases move resources over long distances. City blocks turn the map into a grid of repeatable industrial districts. Each doctrine has strengths. Choose one when the base grows beyond improvisation.\n\nIf items are not arriving, follow the belt. If the belt is empty, follow it upstream. If the belt is full but the machine is idle, check inserters and inputs. If the belt is jammed with the wrong item, begin the Rite of Regret and remove the contamination.

page_mechanicist-research_text_1=Research is how the factory remembers futures it has not yet built.\n\nIn ordinary terms, science packs are crafted and fed into labs. Labs consume those packs to unlock technologies. Each technology adds new recipes, machines, bonuses, or systems. In Mechanist terms, doctrine packs are stamped offerings of organized industrial thought, submitted to the laboratory shrines for approval by the noospheric priesthood.\n\nThe first doctrine pack is simple. Automation science requires copper plates and iron gear wheels. Automate it quickly. Feed it into labs. Research Automation, Logistics, and other early essentials.\n\nLogistic science introduces more complexity. Military science demands ammunition and walls. Chemical science requires oil processing and advanced circuits. Production science requires large-scale industry. Utility science requires high-end circuits, low-density structures, and processing units. Space science requires rockets. Each new pack is not simply a recipe. It is a demand that your entire factory mature.\n\nDo not handcraft science forever. If research is slow, build more labs and produce more packs. If packs are missing, inspect their subchains. If one pack backs up while another is absent, the absent pack is your current bottleneck. The lab does not care about your best intention. It waits for the full tithe.\n\nThe technology tree is not a menu of treats. It is a map of obligations.

page_mechanicist-defense_text_1=The native life does not appreciate the factory. This is understandable. The factory is loud, hot, poisonous, expansionist, and armed. Unfortunately for the native life, the factory also has research labs.\n\nPollution spreads from machines and attracts attacks. Biters and spitters evolve over time and in response to pollution and destruction. The longer you wait, the stronger they become. Defense is not optional unless you disabled enemies, in which case the planet has been granted a temporary exemption from correction.\n\nEarly defense is ammunition and turrets. Automate firearm magazines. Place gun turrets around vulnerable locations. Feed them manually at first, then with belts when practical. Walls buy time. Turrets enforce consequences.\n\nRadar reveals map sectors and helps monitor expansion. Clear nearby nests before pollution reaches them if you want fewer attacks. If attacks are already happening, strengthen walls, increase ammo production, add turrets, and research damage upgrades.\n\nLater defenses include piercing rounds, grenades, flamethrowers, lasers, rockets, artillery, tanks, and personal equipment. Each is a different theological argument delivered at high velocity.\n\nDo not defend only the center. Outposts, rail lines, power poles, and mining expansions are all vulnerable. The enemy does not respect your main bus. It will chew through a lonely power pole and plunge half your base into darkness with the strategic insight of an angry dog.
page_mechanicist-defense_text_2=Defense is production. If you cannot produce ammo, walls, repair packs, and replacement parts, you do not have a defense system. You have a decorative perimeter.

page_mechanicist-oil_text_1=Oil is where Factorio stops pretending to be simple.\n\nCrude oil is pumped from oil fields and processed in refineries. Basic oil processing produces petroleum gas. Advanced oil processing produces petroleum gas, light oil, and heavy oil. Those fluids must be routed, consumed, cracked, stored, or balanced. If one output backs up, the refinery may stop. This is not a bug. It is fluid logistics reminding you that hubris has a viscosity.\n\nPetroleum gas becomes plastic, sulfur, sulfuric acid, and many advanced goods. Plastic is required for advanced circuits. Sulfuric acid supports batteries, uranium mining, and processing units. Light oil can become solid fuel or rocket fuel. Heavy oil can become lubricant or be cracked into light oil. Lubricant supports engines, electric engines, express belts, and other advanced systems.\n\nUse tanks as buffers. Use pumps to control flow. Use cracking recipes to prevent heavy or light oil from blocking production. Eventually, circuit-controlled pumps can regulate cracking intelligently. Until then, simple overproduction and storage may carry you.\n\nPipes are not belts. You cannot easily see throughput at a glance. Long pipe runs lose effective throughput. Pumps help. Underground pipes reduce clutter. Fluid systems should be compact where possible.\n\nOil is not a side quest. It is the rite by which the factory becomes modern.

page_mechanicist-circuits_text_1=Circuits are the nerve tissue of the factory.\n\nElectronic circuits begin simply: copper cable and iron plates. They are needed everywhere. Automate them early and produce more than you think you need. You are wrong about how many you need.\n\nAdvanced circuits require electronic circuits, copper cable, and plastic. This links your circuit production to oil. Processing units require advanced circuits, electronic circuits, and sulfuric acid. This links your high-end electronics to chemical infrastructure. The path from green circuits to blue circuits is the path from optimism to pipe work.\n\nEngines begin with steel, gears, and pipes. Electric engines add circuits and lubricant. These support trains, robots, vehicles, modules, and late-game systems. Engines are slow to craft, so they need dedicated production.\n\nThe lesson is that advanced items are not merely recipes. They are convergences. A processing unit is not just a blue square. It is copper, iron, plastic, sulfur, oil, acid, circuit capacity, belt routing, assembler time, and power demand compressed into one object.\n\nWhen advanced production fails, do not stare at the final assembler. Trace the entire ancestry. Every missing ingredient has parents. Every parent has grandparents. The factory is a genealogy of blame.

page_mechanicist-rail_text_1=Belts are excellent until distance becomes insultingly large. Trains solve distance by turning logistics into scheduled violence.\n\nA basic train system needs rails, locomotives, cargo wagons, fuel, stations, and signals. Rails define the path. Stations define loading and unloading. Locomotives pull. Wagons carry. Signals prevent trains from transforming into expensive sculptures.\n\nStart simple. Build a two-station route from an outpost to your base. Name the stations clearly. Fuel the locomotive. Set a schedule. Load ore at the mine. Unload ore at the base. Use inserters and chests or belts to buffer loading and unloading.\n\nSignals matter. Rail signals divide track into blocks. Chain signals look ahead and prevent trains from entering intersections they cannot clear. If you do not understand signals yet, build simple one-way loops. Complexity can wait until the first collision has finished teaching you humility.\n\nTrains allow expansion beyond local ore patches. They let you feed megabases, artillery fronts, oil outposts, uranium mines, and remote production districts. They also introduce deadlocks, throughput limits, fueling issues, and station naming sins.\n\nA train network is a circulatory system. Keep it signaled, fueled, named, and unclogged.

page_mechanicist-robots_text_1=Robots are small flying servants that convert electricity into convenience and occasional disappointment.\n\nConstruction robots build ghosts, repair damage, deconstruct objects, and place blueprints. Logistic robots move items between logistic chests and players. Roboports provide charging, storage, and network coverage. The orange area is logistics range. The green area is construction range.\n\nConstruction robots change the game. Blueprints allow you to copy designs and place them elsewhere. Ghosts allow future construction. Deconstruction planners remove unwanted structures. Upgrade planners replace old belts, inserters, machines, and other entities.\n\nLogistic robots are powerful but can become a trap. They are excellent for low-volume, high-variety supply. They are less efficient for massive continuous ore movement unless you build an enormous robot infrastructure. Belts and trains still matter.\n\nPersonal roboports let your armor deploy construction robots. This is one of the great thresholds of Factorio. Once you can place blueprints and watch the servo-spirits build, you stop feeling like a laborer and start feeling like a dangerous building permit.\n\nKeep robots charged. Keep repair packs available. Keep construction materials in network storage. Do not strand robots across huge networks with no charging points unless you enjoy watching a swarm reenact bureaucratic exhaustion.

page_mechanicist-modules_text_1=Modules are sanctioned modifications to machine behavior. They are also expensive, addictive, and capable of making your power grid weep.\n\nSpeed modules make machines faster but increase energy use. Productivity modules allow machines to produce extra output for the same input, but they slow machines and increase energy use. Efficiency modules reduce energy use and pollution. Each has a purpose. Each has a cost.\n\nProductivity is especially powerful in expensive chains: labs, circuits, rocket parts, science packs, and high-value intermediates. Extra output in these places multiplies backward through the entire factory. The machine gives more than it was fed. This is suspicious, but useful.\n\nBeacons transmit module effects to nearby machines. Beacon builds can drastically increase throughput, reduce footprint, or intensify power consumption to the point that your electrical network begins writing farewell letters.\n\nModules are not an early-game requirement. They are a mid-to-late-game optimization system. Use them when you can support the cost. A factory that cannot produce enough basic circuits should not yet be attempting spiritual transcendence through beacon arrays.\n\nWhen in doubt: productivity in expensive recipes, speed where throughput matters, efficiency where power or pollution is a problem.

page_mechanicist-nuclear_text_1=Nuclear power is a promise made by uranium and enforced by plumbing.\n\nTo begin nuclear work, mine uranium ore using sulfuric acid. Process it into uranium-235 and uranium-238. Uranium-235 is rare and valuable. Uranium-238 is common and accumulates in large quantities while looking at you accusingly.\n\nReactors consume uranium fuel cells and produce heat. Heat pipes move heat to heat exchangers. Heat exchangers create steam. Steam turbines convert steam into electricity. Reactor adjacency bonuses reward placing reactors together. This means nuclear builds are more efficient when planned as structured arrays rather than lonely glowing boxes.\n\nNuclear systems have several traps. Fuel cells continue burning once inserted. Heat systems require correct ratios. Water supply must be sufficient. Steam turbines must be connected. Spent fuel cells must eventually be reprocessed. Kovarex enrichment later allows reliable uranium-235 production.\n\nNuclear power is dense and strong. It can support large factories, laser defenses, beacon builds, and late-game expansion. Treat it as a sacred heat engine with consequences. Do not build it like a campfire.

page_mechanicist-rocket_text_1=The rocket is not the end of the factory. It is the factory proving that the sky was insufficiently regulated.\n\nTo launch a rocket, you need a rocket silo, rocket parts, rocket fuel, low density structures, processing units, and a large supporting industry. Every part of the factory must mature to feed this demand. Circuits, oil, steel, copper, plastic, modules, power, logistics, and research all converge at the silo.\n\nThe rocket silo is slow, expensive, and hungry. It is supposed to be. A rocket launch is not a single recipe. It is an industrial examination. If your base cannot support the silo, the silo will reveal the weakness by sitting there unfinished like a cathedral of unmet quotas.\n\nAutomate rocket components. Expand resource production. Use trains if patches are far away. Use modules if your economy can support them. Use robots or blueprints to scale proven designs. Research improvements that increase throughput or reduce bottlenecks.\n\nOnce launched, the rocket delivers space science or unlocks expansion paths depending on game version and mod set. In Mechanist terms, the rocket is the first approved insult delivered to the void.

page_mechanicist-space-age_text_1=If Space Age is active, the manufactorum is no longer content with one planet. This is not ambition. It is jurisdictional creep.\n\nSpace platforms become orbital reliquaries, fragile industrial shrines suspended above hostile worlds. They require careful logistics, power, ammunition, asteroid processing, and routing. A platform is not merely a vehicle. It is a moving factory chapel with a vacuum problem.\n\nVulcanus is the forge-world lesson: heat, lava, metallurgy, foundries, and brute industrial extraction. It rewards thermal thinking and punishes soft assumptions.\n\nGleba is the agri-deathworld lesson: growth, spoilage, biological chains, and production that rots if ignored. It teaches that not all logistics are made of metal. Some are wet, judgmental, and alive.\n\nFulgora is the salvage-world lesson: lightning, ruins, scrap, recycling, and the extraction of value from ancient industrial wreckage. It is a planet made of dead machines still filing complaints.\n\nAquilo is the cryo-shrine lesson: cold, isolation, heating, cryogenic progression, and the discipline of keeping systems alive where even pipes seem to resent existing.\n\nSpace Age asks the player to stop thinking of the factory as one base. It becomes a network of planetary doctrines, each with its own rituals, hazards, and material logic.

page_mechanicist-quality_text_1=If Quality is active, production no longer ends at quantity. The machine now judges not only whether an item exists, but whether it has been properly sanctified.\n\nQuality tiers represent increasingly blessed, inspected, certified, or relic-grade outputs. Higher quality items may perform better, last longer, work faster, or provide improved bonuses depending on item type. In ordinary terms, quality is a statistical upgrade system. In Mechanist terms, it is the difference between a loose bolt and a bolt that has received three signatures, two incense passes, and one suspiciously enthusiastic blessing.\n\nQuality modules increase the chance of producing higher-quality results. Recyclers allow unwanted items to be broken back down, creating loops where the factory can pursue better outcomes through repeated production and reclamation.\n\nQuality systems reward planning. Decide where high-quality output matters. Modules, armor equipment, machines, weapons, and certain expensive components may justify the effort. Not every belt needs to be a relic. Some belts merely need to move rocks.\n\nThe Quality doctrine is temptation by refinement. The factory can always produce more. The question becomes whether it can produce better, and how many resources you are willing to sacrifice to make the machine spirits slightly more pleased.

page_mechanicist-survival_text_1=If the factory is failing, do not begin with philosophy. Begin with inspection.\n\nIf machines are idle, check power, ingredients, output space, recipe selection, and inserter direction.\n\nIf research is stopped, check whether every required science pack is reaching the labs.\n\nIf smelting is slow, check ore input, fuel input, furnace count, and output belt capacity.\n\nIf power is low, add generation, add fuel supply, inspect water flow, or reduce demand.\n\nIf attacks are frequent, inspect pollution spread, turret coverage, ammunition supply, walls, and nearby nests.\n\nIf oil has stopped, check whether one fluid output is backed up and blocking the refinery.\n\nIf trains are stopped, check signals, fuel, schedules, station names, and whether another train has achieved interpretive paralysis in an intersection.\n\nIf robots are slow, check charging capacity, robot count, material availability, and network coverage.\n\nIf everything is broken, find the first missing ingredient and trace it backward until you locate the machine that ceased obedience.\n\nThe checklist is not glamorous. It is effective. The Omnissiah does not reward panic. The Omnissiah rewards systematic troubleshooting and enough spare belts.

page_mechanicist-glossary_text_1=Manufactorum: The factory. Also the shrine, workplace, punishment engine, and reason the landscape now has fewer trees.\n\nMachine spirit: The imagined will of a machine. In practical terms, the state of the machine as interpreted by a tired player asking why it stopped.\n\nDoctrine pack: A science pack. A physical token of research demand, submitted to labs for technological permission.\n\nFerric ration: Iron plate. The basic food of industry.\n\nCupric offering: Copper plate. The red metal tribute consumed by circuits and electrical systems.\n\nLitany of motion: Belt logistics.\n\nServo-spirit: Robot, inserter, or any small obedient device performing labor without complaint until power runs out.\n\nNoosphere: The logistics, circuit, rail, and informational network of the factory. Also a dignified word for “the mess of wires and belts I promise I understand.”\n\nHostile biomass: Biters, spitters, worms, nests, and anything else that objects to industrial destiny.\n\nRite of Regret: Removing incorrect items from a belt after contaminating a production line.\n\nFull Heresy: Maximum language intensity. Not recommended for players who require every tooltip to remain sane.

page_mechanicist-heresy_text_1=Full Heresy mode is not the default instructional language of the Administratum. It is the unfiltered sermon-channel of a Tech-Priest who has decided that clarity is less important than doctrinal saturation.\n\nIn Full Heresy mode, items may receive long ritual names. Technologies may become proclamations. Descriptions may accuse you of negligence. Machines may sound offended. A basic gear may be treated as a sacred rotary covenant. A furnace may become a thermal confession chamber. A belt may become a pilgrimage strip for obedient matter.\n\nThis mode is intended for flavor, amusement, and maximum atmosphere. It may reduce readability. It may make search harder unless vanilla search terms are preserved. It may cause ordinary factory planning to feel like an internal dispute between three priesthoods, a quartermaster, and a machine that wants a form signed in triplicate.\n\nIf you are new to Factorio, Standard Mechanist is recommended. If you know the game well and want the factory to sound like it is being narrated by a cathedral full of industrial lunatics, Full Heresy awaits.\n\nProceed with caution. The machine remembers all tooltips.

