page_mechanicist-rampant-fixed_text_1=Rampant Fixed is a conditional Mechanicist doctrine tree. It should appear only when the RampantFixed mod is installed. Its purpose is to teach the young Magos why the native biosphere has stopped behaving like a nuisance and started behaving like a campaign opponent. Proceed through these pages if you require instruction in pollution discipline, layered defenses, logistics-fed violence, radar vigilance, artillery sterilization, and the sacred humiliation of xenos pathfinding.
page_mechanicist-rampant-fixed-overview_text_1=Young Magos, attend.\n\nThe installation of Rampant Fixed is not a decorative rite. It is not a minor administrative deviation. It is the formal awakening of a hostile biosphere that has learned to hate with structure, patience, memory, and teeth.\n\nIn ordinary Factorio, the alien fauna is dangerous, but often predictable. Pollution angers the nests. Nests form attack groups. The engineer builds walls, turrets, ammunition belts, and eventually artillery. The enemy reacts, but it does not truly feel like a coordinated military intelligence.\n\nRampant Fixed changes this doctrine.\n\nThe xenos no longer merely wander toward the smoke. They probe. They gather. They search for passage through your defenses. They may attack from afar. They may mutate existing nests. They may bring new enemy forms and new tactical pressures to bear. With Space Age active, their malice can extend across the broader planetary war-theater, including support for Space Age planets and the hostile units of those worlds.\n\nThis is no longer pest control.\n\nThis is war.\n\nYour manufactorum is now a fortress-monastery of production, and every belt, turret, radar mast, repair pack, wall segment, minefield, artillery shell, and replacement power pole is part of the liturgy of survival.
page_mechanicist-rampant-fixed-what-it-does_text_1=In plain terms, Rampant Fixed makes enemies smarter, more varied, and more aggressive.\n\nIt is based on the older Rampant enemy overhaul, updated and fixed for modern Factorio play. It rewrites major portions of enemy behavior. It can add new enemy types. It can allow enemies to attack from greater range. It improves enemy pathfinding around or through defensive layouts. It can mutate existing nests so that previously familiar enemy territory becomes strategically unstable. It can work with Space Age planets, allowing the war against the local biosphere to follow you into wider planetary doctrine.\n\nThe important lesson is this: defenses that were good enough for vanilla may no longer be good enough.\n\nA simple wall of gun turrets may hold for a while. Then it will become a casualty report.\n\nA single ammunition belt may work until the attack groups grow large enough to starve it.\n\nA pollution cloud left to expand without radar, patrols, or artillery may become an invitation written in soot.\n\nRampant Fixed rewards paranoia, layered defense, logistics redundancy, and the refusal to treat the perimeter as someone else’s problem.
page_mechanicist-rampant-fixed-vanilla-vs-rampant_text_1=Vanilla enemies are a local ecological hazard.\n\nRampant enemies are closer to a campaign opponent.\n\nIn vanilla, the young engineer often learns a simple equation: pollution reaches nests, nests send attacks, attacks follow fairly understandable routes, turrets solve the immediate problem. This remains useful knowledge, but it is no longer enough.\n\nUnder Rampant doctrine, the xenos may respond to more than simple pollution pressure. They may organize more dangerous attack waves. They may search more effectively for weaknesses. They may exploit gaps, thin spots, poorly supplied turret nests, or defensive lines that were designed as decorative fences rather than killing grounds.\n\nThe Magos must abandon the childish belief that walls are defense.\n\nWalls delay.\n\nTurrets punish.\n\nLogistics sustains.\n\nRadar warns.\n\nArtillery sterilizes.\n\nRepair bots preserve.\n\nFlamethrowers deny.\n\nMines humiliate.\n\nThe wall is not the weapon. The wall is the altar upon which the enemy is held still long enough for the weapon to explain theology.
page_mechanicist-rampant-fixed-pollution_text_1=Pollution is not merely smoke.\n\nPollution is a broadcast.\n\nEvery drill, furnace, boiler, assembler, refinery, chemical plant, and incinerated forest sends a message into the dark:\n\n“We are here. We are expanding. Come and object.”\n\nIn vanilla, this sermon is already dangerous. Under Rampant Fixed, it becomes a strategic liability. The xenos may punish careless expansion sooner, harder, and from directions the unprepared Magos did not expect.\n\nThis does not mean you should stop producing.\n\nThat is cowardice.\n\nIt means production must be matched by perimeter doctrine. Every new smelting block implies ammunition demand. Every new oil field implies wall frontage. Every mining outpost implies rails, power, repair infrastructure, and a plan for what happens when something with too many legs decides to contest your mineral rights.\n\nExpansion without defense is not ambition.\n\nIt is feeding.
page_mechanicist-rampant-fixed-early-game_text_1=In the early game, your first task is not beauty. It is not ratios. It is not perfect bus design. It is survival through ugly sufficiency.\n\nSecure iron. Secure copper. Secure coal or early power. Establish ammunition production earlier than comfort suggests. Do not wait until the first major attack to discover that your gun turrets are decorative shrines full of hope and no magazines.\n\nA young Magos should prioritize:\n\n- automated firearm magazine production,\n- early radar coverage,\n- small clusters of turrets at likely attack vectors,\n- walls around critical power and smelting structures,\n- backup ammunition chests,\n- repair packs,\n- and enough spare power poles to restore severed limbs of the grid.\n\nDo not build one heroic turret and name it victory.\n\nBuild overlapping fields of fire. Build ammunition supply. Build fallback positions. Build the ability to replace losses while the smoke is still rising.\n\nThe Omnissiah does not bless under-supplied perimeter theater.
page_mechanicist-rampant-fixed-kill-zones_text_1=A flat wall is a polite suggestion.\n\nA defended wall is a negotiation.\n\nA kill zone is doctrine.\n\nRampant enemies are more dangerous when they can concentrate on a small weakness without paying a price. Your defensive lines should make every approach costly. Corners should be reinforced. Chokepoints should be exploited. Lakes, cliffs, and terrain should be used as sacred geometry. A belt-fed turret wall should not merely shoot; it should maintain fire under stress.\n\nFlamethrower turrets deserve special reverence. They do not merely damage the enemy. They write denial across the ground. When properly supplied, they transform approach routes into burning scripture.\n\nBut do not trust a single system.\n\nGun turrets consume ammunition. Laser turrets consume power. Flamethrowers consume fluid and need pipe integrity. Mines are expendable. Walls are ablative. Robots can repair, but robots can also die in droves if the line is still under fire.\n\nLayer the systems.\n\nThe enemy is allowed to reach the first wall. It is not allowed to leave.
page_mechanicist-rampant-fixed-logistics_text_1=The ignorant novice asks, “How many turrets do I need?”\n\nThe competent Enginseer asks, “How do I keep them fed?”\n\nRampant Fixed punishes defenses that look strong but are logistically hollow. A long turret wall with one weak ammunition belt is a corpse wearing armor. A laser grid without accumulator support is a blackout waiting to become a breach. A flamethrower line with exposed pipes is a prayer with a cut throat.\n\nDefense logistics should be treated as its own production chain.\n\nAmmunition must be manufactured, transported, buffered, and delivered. Repair packs must reach roboports. Replacement walls, turrets, inserters, belts, pipes, and power poles must be available near the front. Robots should not need to fly halfway across the empire to replace one chewed wall while twenty more are being eaten.\n\nEvery defensive sector should be thought of as a chapel with its own supplies.\n\nA wall that cannot repair itself is not a wall.\n\nIt is a countdown.
page_mechanicist-rampant-fixed-radar_text_1=Radar is not optional.\n\nRadar is the eye of the Machine God.\n\nWithout vision, you do not have strategy. You have surprise. Surprise is what happens when a Magos confuses ignorance with peace.\n\nRampant enemies may apply pressure in ways that make passive defense inadequate. You need to know where nests are growing. You need to know where pollution is spreading. You need to know which outposts are becoming exposed, which corridors are likely to become attack lanes, and where the xenos are massing beyond the edge of your comfortable assumptions.\n\nRadar coverage buys time.\n\nTime allows ammunition production.\n\nTime allows artillery deployment.\n\nTime allows rail supply.\n\nTime allows you to stop pretending the screaming alarm was “unexpected.”\n\nThe battlefield was speaking. You simply had not installed enough ears.
page_mechanicist-rampant-fixed-expansion_text_1=Expansion is no longer a casual land grab.\n\nUnder Rampant Fixed, outposts must be planned like forward operating shrines. A mining patch is not just miners and belts. It is a perimeter, a station, a power plan, a repair plan, a resupply plan, and a retreat plan.\n\nWhen claiming new resources, bring defenses with the first construction wave. Do not build the miners first and “come back later” with walls. That is how a young Magos donates steel to the digestive organs of the unclean.\n\nA good outpost includes:\n\n- radar,\n- local turret coverage,\n- ammunition or power supply,\n- walls at likely approach routes,\n- repair packs or roboport coverage when available,\n- spare materials,\n- and a path for reinforcement.\n\nRail outposts should be especially respected. Trains can carry astonishing volumes of supplies, but rail lines also create long, fragile arteries. If the xenos sever the rail, the outpost becomes a stranded organ.\n\nA severed organ rots.
page_mechanicist-rampant-fixed-artillery_text_1=Artillery is not cruelty.\n\nArtillery is time management.\n\nIn a Rampant Fixed world, enemy territory should not be allowed to sit comfortably at the edge of your pollution cloud, mutating, organizing, and preparing theological disagreement. Artillery gives the manufactorum the ability to declare that no nest within range has administrative permission to exist.\n\nHowever, artillery is not a magic wand. It provokes retaliation. It demands shells. It demands defended positions. It demands radar or targeting support. It demands that the Magos understand the difference between “removing a nest” and “inviting every surviving xenos in the postal code to file a complaint.”\n\nDeploy artillery behind real defenses.\n\nFeed it properly.\n\nExpect counterattacks.\n\nThen continue firing.\n\nThe best biter nest is not the one you heroically survived.\n\nIt is the one that never finished forming the attack group.
page_mechanicist-rampant-fixed-weapons_text_1=Each weapon system is a different sermon.\n\nGun turrets are honest. They consume metal and produce dead enemies. They are excellent early and remain useful when fed properly.\n\nLaser turrets are elegant but power-hungry. They convert grid stability into violence. If your power collapses, so does your faith.\n\nFlamethrower turrets are sacred area denial. They are especially valuable against dense waves and predictable approach paths. Their fuel logistics and pipe routing deserve protection.\n\nMines are disposable contempt. They punish enemies for approaching incorrectly. They are useful in layered defenses, breach zones, and emergency fallback lines.\n\nWalls are not weapons, but they decide where weapons get to speak.\n\nThe wise Magos does not ask which weapon is best.\n\nThe wise Magos asks which combination causes the enemy to die before reaching anything expensive.
page_mechanicist-rampant-fixed-space-age_text_1=Rampant Fixed can work with Space Age planets and hostile units. This matters because the war may no longer be confined to Nauvis biters.\n\nWhere Space Age introduces planet-specific hazards, enemies, demolishers, Gleba units, and broader planetary logistics, Rampant Fixed can intensify the sense that each world is not merely a resource puzzle but an active theater of hostility.\n\nThis is especially important for the Mechanist doctrine of interplanetary logistics. A planet under pressure is not just a place that needs belts and machines. It needs spare parts, weapons, repair infrastructure, and enough independent production to avoid collapsing when a supply rocket is delayed.\n\nEvery planet becomes a shrine.\n\nEvery shrine needs walls.\n\nEvery wall needs ammunition.\n\nEvery ammunition line needs industry.\n\nEvery industry needs power.\n\nEvery power plant is a target.\n\nWelcome to theology.
page_mechanicist-rampant-fixed-lessons_text_1=Rampant Fixed teaches humility through casualties.\n\nIf you lose a wall, ask why it could not be repaired.\n\nIf you lose a turret, ask why it stood alone.\n\nIf you lose an outpost, ask why it had no local supply.\n\nIf you lose power, ask why the grid had no reserve.\n\nIf you lose a rail line, ask why it was undefended.\n\nIf you lose the base, ask why you mistook production for preparedness.\n\nThe enemy is not cheating by exploiting your weakness.\n\nThe enemy is performing quality assurance.\n\nThe Machine God has sent auditors with claws.
page_mechanicist-rampant-fixed-checklist_text_1=Before enabling Rampant Fixed or before allowing pollution to bloom freely, confirm the following:\n\n- ammunition production is automated,\n- turrets are supplied without manual babysitting,\n- pollution borders are watched,\n- radar coverage exists beyond the walls,\n- power has reserve capacity,\n- defenses are layered rather than decorative,\n- outposts are supplied and defensible,\n- repair packs are automated,\n- construction robots are protected where possible,\n- artillery is prepared before late-game nest density becomes intolerable,\n- and no critical production block depends on one exposed power pole.\n\nIf any answer is “not yet,” the correct response is not optimism.\n\nThe correct response is more iron.
page_mechanicist-rampant-fixed-final-admonition_text_1=Young Magos, understand the lesson.\n\nRampant Fixed does not merely make the enemy stronger. It makes complacency visible. It takes every lazy wall, every undersupplied turret, every forgotten outpost, every decorative radar gap, every unprotected rail spur, every power grid held together by one wooden pole and a prayer, and it sends the xenos to grade your work.\n\nThe grade is usually teeth.\n\nDo not resent this.\n\nRejoice.\n\nFor the enemy has given your factory purpose.\n\nThe belts do not move for profit. They move to feed the guns.\n\nThe furnaces do not burn for comfort. They burn to plate the walls.\n\nThe rails do not sing for commerce. They sing to deliver shells.\n\nThe roboports do not hum for convenience. They hum to restore the wounded body of the manufactorum.\n\nAnd when the night comes alive with chitin, acid, flame, thunder, and alarm sirens, remember:\n\nThe Machine God does not ask whether the perimeter is afraid.\n\nThe Machine God asks whether the perimeter is loaded.
