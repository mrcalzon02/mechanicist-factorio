[mechanicist-heresy.entity-description]
assembling-machine-1=A coughing shrine of stamped iron, grudging motors, and minimum-approved incense where matter is bullied into useful obedience.
assembling-machine-2=A more obedient fabrication shrine whose machine-spirit accepts additional ingredients after the correct prayers, seals, and threats are applied.
assembling-machine-3=A high-order machine chapel whose throughput is limited only by belt discipline, component supply, and the operator's willingness to ignore the screaming.
burner-mining-drill=A primitive ore-gnawing engine that eats fuel, spits smoke, and proves that even geology can be made administratively miserable.
electric-mining-drill=An electrically sanctioned resource predator that flays ore from the planet beneath a thin varnish of efficiency and doctrine.
stone-furnace=A crude thermal confession box where ore is forced to admit that it always wanted to become plate.
steel-furnace=A fortified heat tomb that processes raw matter with superior zeal, inferior mercy, and no interest in worker comfort.
electric-furnace=A humming altar of captive lightning where ore is refined beneath the soft devotional glow of industrial overconfidence.
lab=A sanctified ignorance-reduction engine that devours doctrine packs and emits permission slips for increasingly expensive mistakes.
boiler=A pressure-bound vessel in which water is shouted at by heat until it agrees to become productive.
