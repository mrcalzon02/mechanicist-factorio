[mechanicist-standard.item-description]
iron-plate=Basic ferric stock. Unglamorous, obedient, and required by almost everything that intends to survive contact with industry.
copper-plate=Cupric stock for conductive works, low-order circuits, and the early nervous system of the factory.
steel-plate=Iron disciplined through heat until it becomes acceptable for heavier burdens.
stone-brick=A masonry unit suitable for flooring, walls, furnace work, and any structure that must pretend the ground is civilized.
iron-gear-wheel=A simple ferric cogwheel that translates rotation into industrial consequence.
copper-cable=Conductive copper drawn into obedient strands for power, signals, and the factory's developing nervous system.
electronic-circuit=A low-order logic wafer for simple machine obedience.
advanced-circuit=A more capable logic circuit sealed in red and asked not to think too loudly.
processing-unit=A cogitator-grade core for machines that require something adjacent to judgment.
engine-unit=A compact combustion drive heart for vehicles, pumps, and other machinery that must express intent through motion.
electric-engine-unit=An electrically obedient drive heart for higher machines that require motion without open combustion.
battery=A galvanic charge cell for storing obedient lightning until the factory finds a use for it.
plastic-bar=Processed polymer stock for circuits, advanced components, and the petrochemical consequences of progress.
sulfur=Reactive yellow alchemical matter for acids, explosives, and the less polite portions of chemistry.
explosives=Sanctioned detonation compound for authorized terrain correction and hostile biomass negotiation.
automation-science-pack=A bundled litany of basic automation doctrine, consumed by labs to sanctify improved production.
logistic-science-pack=A bundled litany of movement, sorting, and the sacred art of not carrying everything by hand.
military-science-pack=A doctrine pack for applied disagreement, perimeter correction, and hostile fauna negotiations.
chemical-science-pack=A doctrine pack authorizing fluids, reagents, refinery logic, and other alchemical liabilities.
production-science-pack=A manufactorum doctrine pack for scaling production until problems become architectural.
utility-science-pack=A high-order utility doctrine pack for infrastructure, systems, and expensive solutions to self-inflicted complexity.
space-science-pack=A void doctrine pack containing lessons learned beyond the atmosphere and inside the budgetary nightmare.


