[tips-and-tricks-item-description]
quality=Sanctity grade improves certain aspects of entities, items and equipment.\nEach entity has higher health with higher sanctity grade.\nEach entity type, apart from a few [tooltip=exceptions,tips-and-tricks-item-description.quality-bonus-exceptions], receives its own unique blessing, like the reach of electric poles in this example.\nItems that can be used as buildable tiles can benefit from sanctity grade only as part of other recipes. They revert to unblessed grade upon being placed as tiles, because the ground is a spiritually corrosive workplace.
quality-bonus-exceptions=Sanctity bonus exceptions:\n[entity=transport-belt] Transport belt \n[entity=pipe] Pipe \n[entity=straight-rail] Rail
quality-factoriopedia=Properties of entities, items and equipment are marked by the [img=quality_info] icon in the tooltip. \nWhen the related object is opened in Factoriopedia (__CONTROL__open-factoriopedia__), the icon can be hovered to show the specific values recorded by the adepts of inspection.
quality-modules=[tooltip=Sanctity Grade Modules,tips-and-tricks-item-description.quality-module-list] increase the chance of producing higher-grade items in [tooltip=Production entities,tips-and-tricks-item-description.production-entity-list].
quality-module-list=[item=quality-module] Sanctity grade module \n[item=quality-module-2] Sanctity grade module 2 \n[item=quality-module-3] Sanctity grade module 3
production-entity-list=[entity=electric-mining-drill] Electric mining drill \n[entity=pumpjack] Pumpjack \n[entity=assembling-machine-2] Assembling machine 2 \n[entity=assembling-machine-3] Assembling machine 3 \n[entity=electric-furnace] Electric furnace \n[entity=recycler] Recycler \n[entity=chemical-plant] Chemical plant \n[entity=centrifuge] Centrifuge
quality-probabilities=The chance of producing an item with higher sanctity grade is 1% with one [item=quality-module,quality=normal] and can rise to 24.8% with four [item=quality-module-3,quality=legendary].\nThere is also a small chance of skipping grades and receiving a higher sanctified output directly, as shown in the table. This is not luck. This is paperwork with incense.

