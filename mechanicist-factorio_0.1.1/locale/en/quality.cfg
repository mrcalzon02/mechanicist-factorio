epic-quality=Authorizes the manufactorum to recognize and preserve relic-grade outputs rather than mistakenly filing them as ordinary industrial surplus.
legendary-quality=Authorizes the highest grade of machine-blessed output: components so precisely formed that lesser adepts may mistake competence for divinity.
recycling=The recycler reverses most processes except smelting and chemistry, returning 25% of the ingredients on average. Fluid ingredients are not regained. Other items are usually returned 25% of the time, losing 75% to sanctioned inefficiency, or turned to spoilage if they were biological.

