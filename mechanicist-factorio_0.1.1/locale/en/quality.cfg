# -----------------------------------------------------------------------------
# Mechanicist Factorio - Informatron Compatibility: Quality Doctrine
# -----------------------------------------------------------------------------

[informatron]
mechanicist-quality=Sanctity Grade Protocols

[mechanicist-quality]
menu_mechanicist-quality=Sanctity Grade Protocols
title_mechanicist-quality=Sanctity Grade Protocols
page_mechanicist-quality_text_1=The Quality expansion does not merely add better items. That is the childish interpretation, suitable for an untrained logistician still licking coal dust from his fingers. In Mechanicist terms, Quality introduces sanctity grades: a formal hierarchy of inspected, certified, consecrated, relic-grade, and Omnissian-perfected output.\n\nAt the practical level, this means that items, machines, equipment, modules, and certain structures may exist in superior grades. Higher-grade machines may have better properties. Higher-grade equipment may perform more effectively. Higher-grade intermediates can be used to craft higher-grade finished products. The factory is no longer only a question of quantity. It is now also a question of worthiness.\n\nThe old industrial prayer was simple: make more. The new prayer is harsher: make more, inspect more, reject more, recycle more, and beg the machine to reveal one object in a thousand that does not deserve to be thrown back into the reclamation reliquary.

menu_mechanicist-quality-core-loop=The Core Sanctity Loop
title_mechanicist-quality-core-loop=The Core Sanctity Loop
page_mechanicist-quality-core-loop_text_1=The Quality loop is a sacred cycle of production, judgment, selection, and reclamation. First, ordinary materials enter machines fitted with sanctity grade modules. These modules reduce crude throughput efficiency in exchange for the possibility of producing higher-grade outputs. The machine does not become generous. It becomes judgmental.\n\nSecond, the factory must separate the worthy from the merely adequate. Higher-grade products should be filtered, stored, routed, or reserved for higher-value uses. Unblessed surplus may continue feeding ordinary production, but consecrated and relic-grade products should not be dumped thoughtlessly into the same chest as common industrial feedstock unless you enjoy watching saints drown in a warehouse of peasants.\n\nThird, failed or unwanted products can be fed into the recycler. The recycler does not refund your mistakes. It punishes them. On average, it returns a fraction of ingredients and consumes the rest as the cost of procedural humiliation. This is not inefficiency. This is the tithe.

menu_mechanicist-quality-grades=Sanctity Grades
title_mechanicist-quality-grades=Sanctity Grades
page_mechanicist-quality-grades_text_1=The sanctity grades are the ladder by which crude matter attempts, usually unsuccessfully, to approach divine function.\n\nUnblessed is the ordinary state of mass production. It is not evil. It is merely common, and common things are allowed to exist only because the factory is hungry.\n\nInspected output has passed the first meaningful rite of distinction. It is better, though not yet impressive. Treat it as evidence that the machine-spirit is awake enough to be bribed.\n\nConsecrated output is the beginning of serious industrial nobility. When such components appear, route them carefully. Feed them into machines, equipment, and modules where their improved grade will matter.\n\nRelic-Grade output is no longer just better production. It is logistics with a halo and a requisition form signed in red ink.\n\nOmnissian Perfected output is the rarest blessing. Do not waste it on disposable clutter unless the tactical situation demands heresy wearing a practical hat.

menu_mechanicist-quality-modules=Sanctity Grade Modules
title_mechanicist-quality-modules=Sanctity Grade Modules
page_mechanicist-quality-modules_text_1=Sanctity grade modules are installed into compatible production machines to create a chance of producing higher-grade items. This is the central mechanism of the Quality expansion. Without these modules, most production remains spiritually flat: useful, obedient, and depressingly ordinary.\n\nInstall them where the output matters. Early on, that may mean intermediates such as circuits, gears, engines, or modules themselves. Later, you may use them in complex chains where higher-grade ingredients can be preserved into higher-grade final products. The doctrine is simple: do not sanctify gravel unless the gravel becomes a cathedral.\n\nRemember that quality modules compete with speed and productivity modules. A machine full of sanctity modules may produce less raw volume than an optimized speed or productivity setup. The question is not whether it makes more. The question is whether it makes something worthy.

menu_mechanicist-quality-recycling=Reclamation Doctrine
title_mechanicist-quality-recycling=Reclamation Doctrine
page_mechanicist-quality-recycling_text_1=The recycler is not a refund machine. It is a confessional booth with teeth. Feed an item into the reclamation reliquary and it will attempt to recover ingredients, usually returning only a portion while consuming the rest as industrial penance.\n\nThis matters because quality production creates excess. You will make piles of ordinary products while hunting for the rare blessed outputs you actually want. Without recycling, those failed offerings become warehouse sediment. With recycling, they become another chance to recover material and continue the rite.\n\nThe recycler also enables loops. You may produce an item with quality modules, filter out the higher-grade results, recycle the rejects, recover part of the input chain, and feed the remains back into production. The factory becomes a devotional centrifuge: spinning waste, faith, and statistical cruelty until something shines.

menu_mechanicist-quality-filtering=Sorting the Blessed from the Unworthy
title_mechanicist-quality-filtering=Sorting the Blessed from the Unworthy
page_mechanicist-quality-filtering_text_1=Quality is useless if your factory cannot distinguish sacred output from common stock. The moment sanctity grades enter your production lines, your logistics system must learn discrimination. This is not optional. This is survival.\n\nUse filters, splitters, circuit conditions, logistic requests, and separate storage for different grades. If every quality tier goes into one chest, you have built not a warehouse but a theological landfill. The machine will still function, but your ability to use higher-grade components intelligently will be strangled by your own laziness.\n\nA good early pattern is simple: produce with quality modules, filter higher-grade results into a separate chest, and let ordinary results continue along the normal production line or into recycling. Later, create dedicated sanctity chains where high-grade ingredients are preserved and directed toward high-grade machines, modules, armor, equipment, and critical infrastructure.

menu_mechanicist-quality-production-chains=Designing Sanctified Production Chains
title_mechanicist-quality-production-chains=Designing Sanctified Production Chains
page_mechanicist-quality-production-chains_text_1=Do not attempt to sanctify everything at once. That path leads to chest spam, belt knots, and an emotional state best described as administratively condemned.\n\nStart with a narrow target. Choose one family of products: modules, personal equipment, assemblers, inserters, power poles, roboports, or military equipment. Then build a controlled chain around that target. Add quality modules to the relevant production machines. Filter improved results. Recycle unwanted stock. Store the blessed items separately.\n\nThe holy secret is focus. A factory trying to quality-upgrade everything becomes a screaming archive of unsorted exceptions. A factory that quality-upgrades one meaningful category at a time becomes a shrine of controlled escalation.

menu_mechanicist-quality-machines=Machines Worth Sanctifying
title_mechanicist-quality-machines=Machines Worth Sanctifying
page_mechanicist-quality-machines_text_1=Some objects deserve sanctity more than others. Higher-grade machines and equipment can provide better performance, durability, reach, capacity, or related properties depending on the object. The exact benefit can be inspected through Factoriopedia and tooltips.\n\nGood early candidates include assemblers, electric mining drills, modules, power poles, personal equipment, and logistics infrastructure. These items either multiply factory performance or remain in use long enough to justify the effort.\n\nPoor early candidates include disposable clutter, objects you will immediately replace, or tiles and basic supplies that do not preserve useful quality effects once placed or consumed. A novice blesses everything. An adept blesses leverage.

menu_mechanicist-quality-armor-equipment=Armor, Equipment, and Relic Loadouts
title_mechanicist-quality-armor-equipment=Armor, Equipment, and Relic Loadouts
page_mechanicist-quality-armor-equipment_text_1=Personal equipment benefits especially well from sanctity doctrine because it accompanies the engineer into danger. Better equipment can mean stronger shields, better power generation, improved batteries, stronger exoskeleton performance, or more durable tools of survival depending on the item.\n\nThis is where higher-grade production feels personal. A blessed belt segment helps the factory. A blessed shield keeps your bones from being translated into battlefield paste. Treat equipment sanctification as a survival investment, not a vanity project.\n\nBuild a dedicated quality chain for armor and grid equipment when your factory can support the cost. Filter high-grade intermediates, preserve them for equipment crafting, and resist the temptation to spend relic-grade components on some temporary patch of nonsense near a smelter you will bulldoze in ten minutes.

menu_mechanicist-quality-modules-beacons=Modules, Beacons, and Recursive Greed
title_mechanicist-quality-modules-beacons=Modules, Beacons, and Recursive Greed
page_mechanicist-quality-modules-beacons_text_1=Quality modules can be used to produce better modules, and better modules can improve later production. This is the recursive greed engine at the heart of sanctity doctrine. The machine judges the tools that help it judge.\n\nA sensible approach is to create a dedicated module production line with quality modules installed. Filter improved modules into separate storage and use them to upgrade the very production lines that created them. This becomes slow, expensive, and extremely satisfying in the way only sanctioned self-improvement through industrial suffering can be.\n\nBeacons complicate the doctrine. Speed, productivity, and quality all compete for space and purpose. Do not blindly insert the shiniest thing into every slot. Decide whether a build exists for volume, efficiency, superior grade, or a carefully balanced compromise.

menu_mechanicist-quality-space-age=Quality in Space Age
title_mechanicist-quality-space-age=Quality in Space Age
page_mechanicist-quality-space-age_text_1=When Space Age is present, sanctity doctrine becomes interplanetary. Your blessed components may need to travel by rocket, survive void logistics, and feed machines on worlds that hate you in distinct and educational ways.\n\nQuality can improve space platforms, planetary infrastructure, equipment, and critical machines. But the cost of transporting materials between planets means you must think carefully about where sanctity production belongs. Some high-grade components should be manufactured where the ingredients are abundant. Others should be produced centrally and shipped like relics under armed supervision.\n\nThe Red Priests advise a simple rule: if a component is expensive to move, bless it near its source. If a component is strategically irreplaceable, bless it where your logistics can protect it.

menu_mechanicist-quality-difficulty=Why Quality Makes the Game Harder
title_mechanicist-quality-difficulty=Why Quality Makes the Game Harder
page_mechanicist-quality-difficulty_text_1=Quality adds difficulty because it attacks the assumption that all identical items are identical. A belt is no longer just a belt. A module is no longer just a module. A stack of parts may contain common industrial scraps beside machine-blessed treasures that should be routed elsewhere.\n\nThis creates logistical complexity. You need filtering. You need separate storage. You need decisions about whether to recycle, preserve, upgrade, or consume. You may also need to rebuild old production systems that were perfectly adequate before sanctity grades arrived to ruin your complacency.\n\nIn exchange, Quality gives you a new axis of mastery. You are not merely scaling production outward. You are refining it upward.

menu_mechanicist-quality-checklist=Sanctity Checklist
title_mechanicist-quality-checklist=Sanctity Checklist
page_mechanicist-quality-checklist_text_1=Before beginning a major sanctity project, recite the checklist and spare yourself the embarrassment of being outplanned by a chest.\n\nChoose one target product family. Install quality modules only where they serve that target. Filter improved outputs immediately. Store different grades separately. Recycle unwanted ordinary output where appropriate. Preserve high-grade intermediates for high-grade final products. Inspect Factoriopedia to learn what quality actually changes for each item. Do not allow relic-grade parts to vanish into ordinary mass production unless you made that choice deliberately.\n\nAbove all, remember that Quality is not free power. It is a machine for converting excess production, logistical discipline, and statistical patience into superior artifacts.

menu_mechanicist-quality-final-warning=Final Warning of the Inspection Priests
title_mechanicist-quality-final-warning=Final Warning of the Inspection Priests
page_mechanicist-quality-final-warning_text_1=The Quality expansion rewards patience and punishes sloppiness. It will expose weak sorting, lazy storage, careless bus design, and every place where you once assumed that one stack of items was spiritually equivalent to another.\n\nDo not fear this. Fear is inefficient unless properly harnessed. Build filters. Build recyclers. Build dedicated sanctity chains. Record what each grade is for. Let the unblessed feed the furnaces of volume. Let the inspected support the machine. Let the consecrated become infrastructure. Let the relic-grade become leverage. Let the Omnissian perfected be spent only where history itself will notice.\n\nThe machine has judged your factory and found it improvable. This is mercy.
