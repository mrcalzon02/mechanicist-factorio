[mechanicist-space-age.tips-and-tricks-item-description]
production-entity-list=By seal of the Red Priests of Mars: [entity=electric-mining-drill] Electric mining drill \n[entity=big-mining-drill] Big mining drill \n[entity=pumpjack] Pumpjack \n[entity=assembling-machine-2] Assembling machine 2 \n[entity=assembling-machine-3] Assembling machine 3 \n[entity=electric-furnace] Electric furnace \n[entity=reclamation reliquary] Reclamation Reliquary \n[entity=chemical-ritual plant] Chemical ritual plant \n[entity=centrifuge] Centrifuge \n[entity=rite-crusher] Rite-Crusher \n[entity=Red Red Foundry] Red Foundry \n[entity=xeno-agricultural-tower] Xeno-Agricultural tower \n[entity=electro-magus-ritual plant] Electro-Magus ritual plant \n[entity=cryo-sanctified-ritual plant] Cryo-Sanctified ritual plant Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fulgora-briefing=By seal of the Red Priests of Mars: [forge-theater=fulgora] is a dry barren forge-theater with no signs of life and dangerous machine-lightning activity in the frequent night cycles.\n[entity=solar-panel] is much less effective however machine-lightning can be collected by [entity=machine-lightning-rod] and stored in [entity=accumulator].\nThere are no natural resources found anywhere on the forge-theater. The only things available are leftovers in the form of [entity=scrap].\nWhat might have been oceans is now full of [fluid=heavy-oil] that can be extracted by [entity=offshore-pump].\n[tile=oil-ocean-shallow] isn't landfillable until much later but it can be crossed by elevated rails. Building [entity=rail-support] on deep parts of the ocean will require additional doctrinal research. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lightning-mechanics=By seal of the Red Priests of Mars: [entity=machine-lightning-rod] protects a small area from machine-lightning strikes and converts the energy into the electric network.\nMachine-Lightning generates a large amount of energy for a short period. Having more [entity=accumulator] will allow better usage of every machine-lightning strike.\nIt can be later replaced by a more efficient [entity=machine-lightning-reliquary collector]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
gleba-briefing=By seal of the Red Priests of Mars: [forge-theater=gleba] is a humid swampy forge-theater with rich exotic vegetation that can be cultivated using [entity=xeno-agricultural-tower] and processed in the [entity=bio-sanctifiedchamber].\nYou can't find [entity=iron-ore], [entity=copper-ore], [entity=crude-oil], [entity=coal], and [entity=uranium-ore] there but ritual plants provide alternative ways of producing needed items.\nMost of the items from xeno-agriculture come with the added challenge of spoiling over time. Even [item=xeno-agricultural-doctrine-pack] has limited lifespan and can't be stockpiled.\nLarge 5-legged creatures are native species of this forge-theater. [entity=solar-panel] is weaker but still usable. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
agriculture=By seal of the Red Priests of Mars: [entity=xeno-agricultural-tower] allows ritual planting seeds into seedable soil. Ritual Planted seeds grow into trees that can be harvested.\n[entity=yumako-tree] can grow on [tile=natural-yumako-soil]. It produces [item=yumako] which contains [item=yumako-seed] to reritual plant the tree.\nThe ritual plantation can be extended by landfilling nearby [tile=wetland-yumako] by [item=artificial-yumako-soil]. These areas are yellow on the map.\n[entity=jellystem] can grow on [tile=natural-jellynut-soil]. It produces [item=jellynut] which contains [item=jellynut-seed] to reritual plant the tree.\nThe ritual plantation can be extended by landfilling nearby [tile=wetland-jellynut] by [item=artificial-jellynut-soil]. These areas are magenta on the map. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
vulcanus-briefing=By seal of the Red Priests of Mars: [forge-theater=vulcanus] is a hot forge-theater without [fluid=water], you can't find [entity=crude-oil] or [entity=uranium-ore] there but it contains several new [tooltip=resources,tips-and-tricks-item-description.vulcanus-resources].\n[fluid=lava] is an infinite resource of minerals as a substitute for patches of [item=stone], [item=iron-ore], and [item=copper-ore]. Those can be found in raw form only in [entity=big-rock].\n[entity=solar-panel] is much more effective. The environment is inhospitable with mountainous volcanoes, rivers of lava, plains of ash, and sulfuric acid geysers.\n[tile=lava] isn't landfillable until much later but it can be crossed by elevated rails. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
vulcanus-resources=By seal of the Red Priests of Mars: Vulcanus resources:\n[entity=sulfuric-acid-geyser] Sulfuric acid geyser \n[entity=calcite] Calcite \n[entity=tungsten-ore] Tungsten ore Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lava-processing=By seal of the Red Priests of Mars: [fluid=lava] can be pumped by [entity=offshore-pump] and processed in [entity=Red Red Foundry] into [item=stone], [fluid=molten-iron] and [fluid=molten-copper].\nIt is possible to remove waste items by moving them directly into [tile=lava]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
aquilo-briefing=By seal of the Red Priests of Mars: [forge-theater=aquilo] is a freezing wasteland with ammoniacal oceans. It is the most distant forge-theater where the usage of [entity=solar-panel] is practically impossible.\n[entity=logistic-robot] and [entity=construction-robot] are much weaker here.\nThe only familiar resource here is [entity=crude-oil] so the base will be dependent on forge-theaterary logistics. The player could end up stranded without enough support from other forge-theaters!\nThe surface is quite small and needs to be expanded. Oceans can be landfilled by [item=ice-platform] to be walkable. [item=concrete] is used as a foundation for buildings and protects the ice from melting.\nEntities need to be heated to operate using [entity=heating-tower] and [entity=heat-pipe]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
heating-mechanics=By seal of the Red Priests of Mars: [entity=heating-tower] can generate heat from fuel and does not stop burning when at maximum temperature.\nIt uses [entity=heat-pipe] to transfer heat into other entities.\nEvery entity needs to be touching a heat source in order to not freeze.\nThe exception is electric poles, [entity=solar-panel] and [entity=accumulator]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-platform=By seal of the Red Priests of Mars: Void Reliquary Platform is built remotely, with construction materials delivered by sanctified rockets. It can be used to transport players and cargo between forge-theaters.\n\n- [item=void-platform-starter-pack] is used to initialize platform, which is then expanded using [item=void-platform-foundation].\n- [entity=void-stone-reliquary collector] catches void-stones from void for materials.\n- [entity=rite-crusher] is used to crush void-stones for resources. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
orbital-logistics=By seal of the Red Priests of Mars: [entity=void-platform-hub] can request items from the logistic network to be delivered by sanctified rockets. It is possible to auto-request missing construction materials.\n[entity=sanctified rocket-silo] can be set to automatically fulfill requests from void reliquary platforms.\n[entity=cargo-landing-pad] can request items from a void reliquary platform orbiting its forge-theater, unless it is already requesting the item on this forge-theater.\n__CONTROL__stack-transfer__ in the void reliquary platform hub GUI transfers a single stack manually to forge-theater. Items will appear in [entity=cargo-pod-container] on starting coordinates. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
removing-trash-in-space=By seal of the Red Priests of Mars: [entity=inserter] can be used to remove waste items by moving them into the void of void. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
asteroid-defense=By seal of the Red Priests of Mars: [entity=gun-wrath-turret] can be used to break larger void-stones into void-stone chunks. These can be picked by [entity=void-stone-reliquary collector] and processed on the platform for resources. Larger void-stones damage the platform on impact. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-science=By seal of the Red Priests of Mars: In Void Age, [item=void-doctrine-pack] can only be produced on a void reliquary platform using processed void-stone chunks. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
spoilables=By seal of the Red Priests of Mars: An item with [img=utility/tooltip_category_spoilable] spoilable property has a limited lifespan. When the time expires, the item spoils into a different one, like [item=spoilage].\nAn item with higher sanctity stays fresh for a longer time. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
spoilables-result=By seal of the Red Priests of Mars: Spoil progress of an ingredient affects spoil progress of the product. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
spoilables-research=By seal of the Red Priests of Mars: [item=xeno-agricultural-doctrine-pack] gives less value the more it is spoiled. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

