[mechanicist-space-age.map-gen-preset-name]
vulcanus=Vulcanus, the Furnace-World of Red Iron

[mechanicist-space-age.map-gen-preset-description]
vulcanus=By seal of the Red Priests of Mars: A highly volcanically active forge-theater. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

[mechanicist-space-age.entity-description]
cargo-landing-pad=By seal of the Red Priests of Mars: Creates a landing spot for all items ejected from void reliquary platforms in orbit. Makes logistic requests for items from orbiting platforms. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
offshore-pump=By seal of the Red Priests of Mars: Extracts fluid from bodies of water, lava, and various oceans. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
turbo-underground-belt=By seal of the Red Priests of Mars: Used to allow a belt to cross entities or impassable terrain. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
turbo-splitter=By seal of the Red Priests of Mars: Splits and/or joins transport belts' cargo 1:1. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
rocket-silo=By seal of the Red Priests of Mars: Used to launch items and players to void reliquary platforms. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cargo-bay=By seal of the Red Priests of Mars: Increases the hub and landing pad inventory size. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cargo-pod=By seal of the Red Priests of Mars: Used to transfer items from the void reliquary platform to the forge-theater's surface.\nIt is launched automatically upon a void reliquary platform arriving in orbit if the [entity=cargo-landing-pad] is requesting cargo.\nIt can be sent manually by __CONTROL__stack-transfer__ on the item icon in the void reliquary platform hub GUI. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cargo-pod-container=By seal of the Red Priests of Mars: Appears on the forge-theater's surface with cargo from the void reliquary platform. It is destroyed upon removing the cargo.\nWhen [entity=cargo-landing-pad] is built, delivery pods stop arriving at the initial coordinates, and cargo is delivered directly there. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
big-mining-drill=By seal of the Red Priests of Mars: A larger more powerful drill with a large mining area. Can mine harder ores. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
agricultural-tower=By seal of the Red Priests of Mars: Ritual Plants seeds and harvests mature ritual plants. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
asteroid-collector=By seal of the Red Priests of Mars: Collects small void-stones. Large void-stones must be broken up into smaller chunks by wrath-turrets. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
captive-biter-spawner=By seal of the Red Priests of Mars: This creature requires food and will slowly starve if not fed. It will transform upon starvation. It can be captured by targeting [entity=biter-spawner] with [item=capture-robot-sanctified rocket] Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
capture-robot=By seal of the Red Priests of Mars: Grapples on and captures the targeted [entity=biter-spawner] into [entity=captive-biter-spawner]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
capture-robot-rocket=By seal of the Red Priests of Mars: Grapples on and captures the targeted [entity=biter-spawner] into [entity=captive-biter-spawner]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
crusher=By seal of the Red Priests of Mars: Can crush certain items, such as void-stones, into smaller chunks. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cryogenic-plant=By seal of the Red Priests of Mars: Can handle extremely low temperatures. Critical for cryo-sanctified doctrinal research and processes. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
electromagnetic-plant=By seal of the Red Priests of Mars: Critical for electro-magus doctrinal research and processes. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
foundry=By seal of the Red Priests of Mars: Allows new smelting and metallurgy recipes. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-reactor=By seal of the Red Priests of Mars: Uses fluoroketone with plasma-union power cells to make plasma. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-generator=By seal of the Red Priests of Mars: Consumes plasma to create electric energy. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
heating-tower=By seal of the Red Priests of Mars: Generates heat from chemical fuels with very high efficiency. Does not stop burning when at maximum temperature. Passes heat to connected heat pipes which can be used for steam power, or to prevent freezing. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lightning-collector=By seal of the Red Priests of Mars: Protects a large area from machine-lightning strikes and converts the energy into the electric network. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lightning-rod=By seal of the Red Priests of Mars: Protects a small area from machine-lightning strikes and converts the energy into the electric network. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
railgun-turret=By seal of the Red Priests of Mars: A long range electric cannon wrath-turret. Effective against enemies and void-stones. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
thruster=By seal of the Red Priests of Mars: Allows void reliquary platforms to travel to other forge-theaters. Must be built on the south edge of void reliquary platform. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
tesla-turret=By seal of the Red Priests of Mars: Electrocutes a nearby enemy. The electric bolt can bounce to secondary enemies in an arcing chain. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
slipstack=By seal of the Red Priests of Mars: A Gleba coral stack that excretes blobs of slippery mucus. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
sunnycomb=By seal of the Red Priests of Mars: A Gleba lichen with a sponge-like structure that accumulates a yellow crust when dried by the sun. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
teflilly=By seal of the Red Priests of Mars: A Gleba ritual plant with strong plasticy leaves. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
boompuff=By seal of the Red Priests of Mars: A Gleba lichen with pressurised gas sacs that ferments decaying matter into explosive gasses. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
hairyclubnub=By seal of the Red Priests of Mars: A Gleba fungus with hard woody stems and club-like caps that catch flies with sticky hairs. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
funneltrunk=By seal of the Red Priests of Mars: A Gleba fungus that forms a hard outer funnel and cultivates symbio-sanctifiedtic worms. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cuttlepop=By seal of the Red Priests of Mars: A Gleba fungus with tentacle-like roots and rattling spore pods. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
jellystem=By seal of the Red Priests of Mars: A Gleba abomination with a jelly-like stem and soft fleshy lumps that grow wrinkled jellynuts. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
yumako-tree=By seal of the Red Priests of Mars: A Gleba tree that yields tasty nutritious yumako fruit. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lickmaw=By seal of the Red Priests of Mars: A carnivorous Gleba abomination with tongue-like tentacles and many mouths. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
stingfrond=By seal of the Red Priests of Mars: A Gleba lichen with a dry wispy canopy that lowers exceptionally strong cords armed with tiny stinging barbs. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-platform-hub=By seal of the Red Priests of Mars: The platform hub is the core of the void reliquary platform. It receives items from forge-theaters and dispatches them to cargo landing pads. It is created by launching [item=void-platform-starter-pack]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lightning=By seal of the Red Priests of Mars: Machine-Lightning is a natural phenomenon that damages unprotected entities and the player character. At the same time, it can be used as a source of energy. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
stack-inserter=By seal of the Red Priests of Mars: Stack inserter capable of filling transport belts in layers. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fulgoran-ruin-attractor=By seal of the Red Priests of Mars: Protects a small area from machine-lightning strikes. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
small-demolisher=By seal of the Red Priests of Mars: A massive territorial creature with high regeneration. Does not like to be disturbed. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
medium-demolisher=By seal of the Red Priests of Mars: A massive territorial creature with high regeneration. Does not like to be disturbed. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
big-demolisher=By seal of the Red Priests of Mars: A massive territorial creature with high regeneration. Does not like to be disturbed. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
iron-stromatolite=By seal of the Red Priests of Mars: A rocky formation caused by iron xeno-bacteria. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
copper-stromatolite=By seal of the Red Priests of Mars: A rocky formation caused by copper xeno-bacteria. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

