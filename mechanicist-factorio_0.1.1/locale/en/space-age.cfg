[mechanicist-space-age.fluid-description]
thruster-fuel=By seal of the Red Priests of Mars: Liquid void-thruster fuel Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-plasma=By seal of the Red Priests of Mars: Ultra-high-temperature ions generated in [entity=plasma-union-reactor] and consumed by a [entity=plasma-union-generator]. It is not a normal fluid and cannot be moved in [entity=pipe], it can only be moved through the Plasma-Union reactor and Plasma-Union generator.\nThe temperature of plasma determines its energy value.\nA quantity of plasma also represents that amount of coolant that travels with it, and the heated coolant is output by the Plasma-Union generator as the plasma is used for energy. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

[mechanicist-space-age.item-description]
space-science-pack=By seal of the Red Priests of Mars: Used by labs for doctrinal research. Obtained by processing void-stones in void. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
artificial-yumako-soil=By seal of the Red Priests of Mars: Must be placed over [tile=wetland-yumako]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
artificial-jellynut-soil=By seal of the Red Priests of Mars: Must be placed over [tile=wetland-jellynut]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
overgrowth-yumako-soil=By seal of the Red Priests of Mars: Soil for [entity=yumako-tree] placeable anywhere in the green bio-sanctifiedme. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
overgrowth-jellynut-soil=By seal of the Red Priests of Mars: Soil for [entity=jellystem] placeable anywhere in the red bio-sanctifiedme. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-reactor-equipment=By seal of the Red Priests of Mars: Provides power for equipment modules. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-platform-foundation=By seal of the Red Priests of Mars: Can be placed in void to extend existing void reliquary platforms. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-platform-starter-pack=By seal of the Red Priests of Mars: Contains everything needed to set up a void reliquary platform foundation. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
yumako=By seal of the Red Priests of Mars: Nutritious farmable crop. Grants burst of health regeneration when eaten. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
jellynut=By seal of the Red Priests of Mars: Slimy farmable crop. Grants burst of movement speed when eaten. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
yumako-mash=By seal of the Red Priests of Mars: Grants burst of health regeneration when eaten. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
jelly=By seal of the Red Priests of Mars: Grants burst of movement speed when eaten. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
bioflux=By seal of the Red Priests of Mars: Highly nutritious blend of Gleba crops. Grants burst of both health regeneration and movement speed when eaten. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
metallic-asteroid-chunk=By seal of the Red Priests of Mars: An void-stone chunk with high metal content. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
carbonic-asteroid-chunk=By seal of the Red Priests of Mars: An void-stone chunk with high carbon content. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
oxide-asteroid-chunk=By seal of the Red Priests of Mars: An void-stone chunk with high oxygen content. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
promethium-asteroid-chunk=By seal of the Red Priests of Mars: An void-stone chunk only found when approaching the shattered forge-theater. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
capture-robot-rocket=By seal of the Red Priests of Mars: Grapples on and captures the targeted [entity=biter-spawner] into [entity=captive-biter-spawner]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
railgun-ammo=By seal of the Red Priests of Mars: Used to break even the biggest void-stones. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
ice-platform=By seal of the Red Priests of Mars: A stable floating platform of ice for sufficiently cold forge-theaters. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
foundation=By seal of the Red Priests of Mars: Engineered structural foundation with heat shielding and deep screw piles. Can be placed on lava, oil ocean, and most water. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
yumako-seed=By seal of the Red Priests of Mars: Can be ritual planted on yumako soil. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
jellynut-seed=By seal of the Red Priests of Mars: Can be ritual planted on jellynut soil. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

