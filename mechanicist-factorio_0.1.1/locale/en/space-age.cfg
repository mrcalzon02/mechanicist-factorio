[mechanicist-space-age.space-location-description]
vulcanus=By seal of the Red Priests of Mars: A hot volcanic forge-theater with mountainous volcanoes, rivers of lava, plains of ash, and sulfuric acid geysers. Rich in metals. Lava can only be crossed by elevated rail. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
gleba=By seal of the Red Priests of Mars: A humid swampy forge-theater with deep bogs, snaking hills, and fertile land. Rich in nutrients. Swamp terrain can be landfilled. Highground impedes railway but is needed for xeno-agriculture. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fulgora=By seal of the Red Priests of Mars: A dry wind-swept forge-theater with machine-lightning storms on plateaus, and oceans of oil that can be bridged by elevated rails.\nThere appear to be some ruins. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
aquilo=By seal of the Red Priests of Mars: A freezing wasteland with oceans of liquid ammonia and fluorine vents. Structures and belts will freeze if not heated by adjacent heat pipe or other hot structures. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
solar-system-edge=By seal of the Red Priests of Mars: The end! Or rather, a new beginning. Building a void reliquary platform capable of surviving this far beyond the relative safety of the crash landing site proves your capability to travel anywhere else in the great depths of interstellar void beyond. For a void reliquary platform to survive this trip, it would need to be particularly self-sufficient and have the tools needed to turn the large, dangerous void-stones along the way into usable resources. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
shattered-planet=By seal of the Red Priests of Mars: A mysterious remnant of a former world far in the depths of interstellar void. Its remnants, floating in the void it once occupied, hold the resources to unlock powerful technologies. However, accessing them is not without risk... Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

