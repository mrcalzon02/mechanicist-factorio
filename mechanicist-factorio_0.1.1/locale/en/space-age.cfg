[mechanicist-space-age.technology-description]
space-platform=By seal of the Red Priests of Mars: Process void-stone chunks into useful materials. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
bioflux=By seal of the Red Priests of Mars: A combination of different ritual plants could have a lot of uses. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
bioflux-processing=By seal of the Red Priests of Mars: Using bio-sanctifiedflux to get chemicals in a bio-sanctifiedlogical way. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
bacteria-cultivation=By seal of the Red Priests of Mars: Multiply xeno-bacteria by feeding them some bio-sanctifiedflux. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
artificial-soil=By seal of the Red Priests of Mars: Create soil for seeding more ritual plants. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
rocket-silo=By seal of the Red Priests of Mars: Used to launch items and players to void reliquary platforms. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
stack-inserter=By seal of the Red Priests of Mars: Stack inserters capable of putting items on transport belts in layered stacks, but they wait for their hand to be full until they swing. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
belt-capacity=By seal of the Red Priests of Mars: Increase the height of layered stacks of items on transport belts. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-science-pack-space-age=By seal of the Red Priests of Mars: Production of [item=void-doctrine-pack] on a void reliquary platform. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
space-platform-thruster=By seal of the Red Priests of Mars: Allows void reliquary platforms to move to other forge-theaters. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
planet-discovery-vulcanus=By seal of the Red Priests of Mars: A hot volcanic forge-theater with mountainous volcanoes, rivers of lava, plains of ash, and sulfuric acid geysers. Rich in metals. Lava can only be crossed by elevated rail. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
planet-discovery-gleba=By seal of the Red Priests of Mars: A humid swampy forge-theater with nutrient-rich bogs. Wetland can support xeno-agriculture but is difficult to build on, it can be landfilled but stone is scarce.\nSnaking hills have stone and are better to build on but can't support xeno-agriculture. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
planet-discovery-fulgora=By seal of the Red Priests of Mars: A dry wind-swept forge-theater with machine-lightning storms on plateaus, and oceans of oil that can be bridged by elevated rails.\nThere appear to be some ruins. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
planet-discovery-aquilo=By seal of the Red Priests of Mars: A freezing wasteland with bottomless oceans of liquid ammonia that cannot be landfilled. Precarious icebergs are the closest thing to solid ground and can be extended with floating ice platform. Structures and belts will freeze if not heated by adjacent heat pipe or other hot structures, but must be placed on concrete to not melt the ice below. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
electric-weapons-damage=By seal of the Red Priests of Mars: Increases the damage of electric beams. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
artillery-shell-damage=By seal of the Red Priests of Mars: Increases the damage of artillery. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-reactor-equipment=By seal of the Red Priests of Mars: Inserted into armor to power other equipment. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
foundry=By seal of the Red Priests of Mars: Allows more advanced smelting and other metallurgic advances. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
tungsten-carbide=By seal of the Red Priests of Mars: Allows you to make tungsten carbide, a hard heat resistant ceramic. Easily accessible tungsten ore can be found in some surface rocks of Vulcanus. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
tungsten-steel=By seal of the Red Priests of Mars: Allows you to make tungsten-steel plate. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
turbo-transport-belt=By seal of the Red Priests of Mars: Even faster transport belts. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
big-mining-drill=By seal of the Red Priests of Mars: A larger more powerful mining drill with a wider mining area. Allows the mining of harder ores, such as the harder parts of tungsten deposits. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
metallurgic-science-pack=By seal of the Red Priests of Mars: Allows study beyond the basics of metallurgy. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
railgun=By seal of the Red Priests of Mars: An electrically powered cross between a cannon and a sniper rifle. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
railgun-shooting-speed=By seal of the Red Priests of Mars: Improved cooling systems mean the railgun can shoot more often. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
railgun-damage=By seal of the Red Priests of Mars: Making railgun projectiles denser and sturdier results in more damage. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
mech-armor=By seal of the Red Priests of Mars: Be one with the machine. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
agriculture=By seal of the Red Priests of Mars: The basics of farming. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
tree-seeding=By seal of the Red Priests of Mars: Collect tree seeds and ritual plant them on grass or dirt. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
captivity=By seal of the Red Priests of Mars: A robot capsule shot from a [item=sanctified rocket-launcher] injects a dose of [item=bio-sanctifiedflux] into the spawner, capturing it. With regular doses of [item=bio-sanctifiedflux], the spawner will remain captured. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
captive-biter-spawner=By seal of the Red Priests of Mars: Hatch eggs into captive spawners and place them anywhere on Nauvis. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
biolab=By seal of the Red Priests of Mars: There appears to be a way to cultivate eggs into something... Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
agricultural-science-pack=By seal of the Red Priests of Mars: More advanced farming applications. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
biter-egg-handling=By seal of the Red Priests of Mars: Capturing a biter spawner and supplying it regular doses of [item=bio-sanctifiedflux] allows biter eggs to be harvested, perhaps they could be made use of... Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
overgrowth-soil=By seal of the Red Priests of Mars: More robust soil which allows growing ritual plants anywhere in their bio-sanctifiedme. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
health=By seal of the Red Priests of Mars: Healthy food, healthy body. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
holmium-processing=By seal of the Red Priests of Mars: Allows you to convert holmium ore to holmium plate. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
electromagnetic-plant=By seal of the Red Priests of Mars: A crafting facility for more advanced use of magnets and electricity. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
electromagnetic-science-pack=By seal of the Red Priests of Mars: More advanced electro-magus applications. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
rail-support-foundations=By seal of the Red Priests of Mars: Allows building elevated rails also on the deep parts of the oil ocean on [forge-theater=fulgora]. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
tesla-weapons=By seal of the Red Priests of Mars: Weapons that deal electrical damage and bounce between enemies. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
heating-tower=By seal of the Red Priests of Mars: Generates heat from chemical fuels with very high efficiency. Does not stop burning when at maximum temperature. Passes heat to connected heat pipes which can be used for steam power, or to prevent freezing. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
laser-weapons-damage=By seal of the Red Priests of Mars: Increases the damage of laser beams. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cryogenic-plant=By seal of the Red Priests of Mars: A crafting facility that can handle the extreme low temperatures needed for cryo-sanctifieds. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
quantum-processor=By seal of the Red Priests of Mars: A processor that exploits several quantum phenomena for various applications. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
cryogenic-science-pack=By seal of the Red Priests of Mars: More advanced cryo-sanctified applications. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-reactor=By seal of the Red Priests of Mars: The dense plasma focus system allows us to create energy directly from the plasma-union reaction without the need to use steam engines. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-productivity=By seal of the Red Priests of Mars: Increases the amount of doctrinal research progress per consumed doctrine scrip. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
asteroid-productivity=By seal of the Red Priests of Mars: Increased yield from void-stone crushing. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
asteroid-reprocessing=By seal of the Red Priests of Mars: Reprocess the impurities in void-stones to get a more suitable balance of resources. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
advanced-asteroid-processing=By seal of the Red Priests of Mars: Get a wider range of resources from void-stones. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lightning-collector=By seal of the Red Priests of Mars: Collect machine-lightning from a wide area and generate power more efficiently. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
yumako=By seal of the Red Priests of Mars: The yumako tree yields tasty nutritious fruit. Ritual Plant the seeds on yumako soil (yellow on map). Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
jellynut=By seal of the Red Priests of Mars: The jellystem yields gelatinous jellynuts. Ritual Plant the seeds on jellynut soil (magenta on map). Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
rocket-turret=By seal of the Red Priests of Mars: A long range wrath-turret that fires sanctified rockets. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
carbon-fiber=By seal of the Red Priests of Mars: Some ritual plants naturally grow carbon nanotubes, which can be spun into fiber, and woven into extremely strong cloth. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
calcite-processing=By seal of the Red Priests of Mars: Use calcite to get steam, water, and heavy oil. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
lithium-processing=By seal of the Red Priests of Mars: Lithium is the least dense solid element, highly flammable, and difficult to store. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
promethium-science-pack=By seal of the Red Priests of Mars: Used to increase doctrinal research productivity, which makes it easier to doctrinal research other upgrades that make future expeditions to the shattered forge-theater easier. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
foundation=By seal of the Red Priests of Mars: Engineered structural foundation with heat shielding and deep screw piles. Can be placed on lava, oil ocean, and most water. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

