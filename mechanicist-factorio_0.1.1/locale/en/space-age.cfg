[mechanicist-space-age.achievement-description]
second-star-to-the-right-and-straight-on-till-morning=By seal of the Red Priests of Mars: Finish the game. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
rush-to-space=By seal of the Red Priests of Mars: Doctrinal Research a technology using another forge-theater's doctrine scrip before unlocking production or utility doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
todays-fish-is-trout-a-la-creme=By seal of the Red Priests of Mars: Eat a legendary fish. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
work-around-the-clock=By seal of the Red Priests of Mars: Finish the game within 100 hours. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
express-delivery=By seal of the Red Priests of Mars: Finish the game within 40 hours. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
reach-for-the-stars=By seal of the Red Priests of Mars: Create a void reliquary platform. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
visit-fulgora=By seal of the Red Priests of Mars: Travel to forge-theater Fulgora. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
visit-vulcanus=By seal of the Red Priests of Mars: Travel to forge-theater Vulcanus. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
visit-gleba=By seal of the Red Priests of Mars: Travel to forge-theater Gleba. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
visit-aquilo=By seal of the Red Priests of Mars: Travel to forge-theater Aquilo. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-with-metallurgics=By seal of the Red Priests of Mars: Doctrinal Research a technology using metallurgic doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-with-agriculture=By seal of the Red Priests of Mars: Doctrinal Research a technology using xeno-agricultural doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-with-electromagnetics=By seal of the Red Priests of Mars: Doctrinal Research a technology using electro-magus doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-with-cryogenics=By seal of the Red Priests of Mars: Doctrinal Research a technology using cryo-sanctified doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
research-with-promethium=By seal of the Red Priests of Mars: Doctrinal Research a technology using promethean relic doctrine scrips. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
crafting-with-quality=By seal of the Red Priests of Mars: Craft a sanctity module 3. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
if-it-bleeds=By seal of the Red Priests of Mars: Kill a small demolisher. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
we-need-bigger-guns=By seal of the Red Priests of Mars: Kill a medium demolisher. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
size-doesnt-matter=By seal of the Red Priests of Mars: Kill a big demolisher. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
make-it-better=By seal of the Red Priests of Mars: Manually insert a sanctity module into a module slot. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
look-at-my-shiny-rare-armor=By seal of the Red Priests of Mars: Equip rare or better sanctity of power armor MK2 or mech armor. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
my-modules-are-legendary=By seal of the Red Priests of Mars: Craft a legendary sanctity module 3. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
no-room-for-more=By seal of the Red Priests of Mars: Fill every tile of legendary mech armor with legendary equipment. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-power=By seal of the Red Priests of Mars: Start producing electric power by plasma-union powerritual plant. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
shattered-planet-1=By seal of the Red Priests of Mars: Travel 10 000 km towards the shattered forge-theater. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
shattered-planet-2=By seal of the Red Priests of Mars: Travel 30 000 km towards the shattered forge-theater. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
shattered-planet-3=By seal of the Red Priests of Mars: Travel 60 000 km towards the shattered forge-theater. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
it-stinks-and-they-do-like-it=By seal of the Red Priests of Mars: Attract a group of pentapods using spores. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
get-off-my-lawn=By seal of the Red Priests of Mars: Disturb a demolisher by building on its territory. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

