# Mechanicist Factorio - Space Age Locale Layer
# Full Tech-Priest / Red Priest of Mars conversion layer.
# These keys are intentionally namespaced so data-updates.lua can apply them when
# mechanicist-factorio-rename-space-age is enabled.

