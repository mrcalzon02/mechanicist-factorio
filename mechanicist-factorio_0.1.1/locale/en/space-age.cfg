[mechanicist-space-age.factoriopedia-description]
fusion-generator=By seal of the Red Priests of Mars: Consumes plasma from the [entity=plasma-union-reactor] to create electric energy. Power production is nominal, but less plasma is consumed if the temperature is higher. It outputs heated coolant equal to the amount of plasma consumed that can be cooled in an [entity=cryo-sanctified-ritual plant]. Plasma-Union generators can be linked and transfer plasma to each other. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.
fusion-reactor=By seal of the Red Priests of Mars: Uses fluoroketone coolant with plasma-union power cells to make super-heated plasma. It can only be output directly to an [entity=plasma-union-generator]. The neighbor bonus with other plasma-union reactors greatly increases the plasma temperature without increasing the amount of coolant used. Obey the rite, preserve the machine-spirit, and record all deviation as probable heresy.

# -----------------------------------------------------------------------------
# Informatron - Space Age Mechanicus Doctrine Layer
# This is intentionally appended as a new locale section. It does not alter the
# names/descriptions above. If Informatron is present, these keys provide a
# dedicated Space Age guide tree for the Red Priests of Mars interpretation of
# interplanetary industry.
# -----------------------------------------------------------------------------

[informatron]
mechanicist-space-age=Mechanicist Space Age Doctrine

[mechanicist-space-age]
menu_mechanicist-space-age=Space Age Doctrine
page_mechanicist-space-age_text_1=+++ NOOSPHERIC BRIEFING ACCEPTED +++\n\nThis annex explains how the Space Age expansion is understood beneath Mechanicist Factorio. The vanilla expansion sends the engineer beyond Nauvis to Vulcanus, Gleba, Fulgora, Aquilo, and the void between worlds. Under Mechanicist doctrine, this is not merely exploration. It is the opening of a sanctified interplanetary manufactorum network.\n\nThe surface factory is no longer enough. You must raise rockets, construct orbital platforms, establish cargo exchange between worlds, and extract each planet's cursed specialty without allowing logistics, research, power, or machine obedience to collapse.\n\nUnlike the base language layer, this Space Age layer is deliberately not gentle. It is either enabled or disabled. When enabled, the Red Priests of Mars have signed the order, sealed the lumen-script, and painted every bulkhead red. There is no Standard mode. There is only compliance.
page_mechanicist-space-age_text_2=The Space Age loop is this: build a stable Nauvis industry, launch cargo into orbit, assemble a space platform, travel to a new world, exploit that world's unique resources, return its products to the wider supply chain, and repeat until the entire star system is shackled into one screaming industrial liturgy.\n\nIf you are lost, do not ask whether the new planet is fair. Ask which machine it is teaching you to build. Vulcanus teaches heat, mass production, and metallurgy. Gleba teaches decay, spoilage, biological process chains, and controlled disgust. Fulgora teaches salvage, lightning power, and ruins of dead industry. Aquilo teaches cold, heat distribution, fusion, and the punishment of insufficient preparation. The void teaches that logistics is no longer a belt problem. It is a doctrine of orbital survival.

menu_mechanicist-space-age-orbit=Void Platforms and Orbital Reliquaries
title_mechanicist-space-age-orbit=Void Platforms and Orbital Reliquaries
page_mechanicist-space-age-orbit_text_1=A space platform is not a decorative ship. It is a floating factory, a gun deck, a cargo relay, a refinery of asteroid fragments, and a fragile shrine suspended above planetary gravity by mathematics and repeated acts of industrial arrogance.\n\nYour first platform begins with a [item=space-platform-starter-pack], launched from the [entity=rocket-silo]. In Mechanist terms, this is the laying of the first orbital reliquary keel. The hub receives cargo from below, stores material, and becomes the anchor around which every tile, thruster, grabber, furnace, crusher, belt, turret, and solar panel must be arranged.
page_mechanicist-space-age-orbit_text_2=Build platforms with three priorities. First, survival: power, asteroid collection, ammo, and weapons. Second, propulsion: thrusters and fuel production. Third, logistics: enough cargo capacity and processing to move useful goods without starving the platform.\n\nAsteroids are not scenery. They are incoming supply crates with poor manners. Collectors gather them, crushers break them, and the resulting materials feed ammunition, fuel, and voidborne construction. If the platform cannot defend itself, it becomes debris. If it cannot feed its thrusters, it becomes a shrine to bad planning. If it cannot process inputs, it becomes a warehouse in orbit, which is merely failure with altitude.
page_mechanicist-space-age-orbit_text_3=The sacred rule of platforms is redundancy. A planet factory can survive an ugly bus. A platform cannot. There is limited room, limited mass, limited time, and a constant stream of hazards. Keep critical belts short. Keep ammunition fed. Keep power margins healthy. Keep thruster chemistry clear. Every tile in orbit should answer one question: does this help the shrine travel, fight, process, or deliver cargo? If not, the tile is vanity. The void does not forgive vanity.

menu_mechanicist-space-age-cargo=Cargo, Rockets, and Interplanetary Logistics
title_mechanicist-space-age-cargo=Cargo, Rockets, and Interplanetary Logistics
page_mechanicist-space-age-cargo_text_1=Space Age changes Factorio from one factory into a system of factories. The rocket silo is no longer a victory monument. It is a freight elevator pointed at the stars. The cargo landing pad is not a chest. It is a planetary receiving altar. The space platform is not a vehicle. It is the moving belt between worlds.\n\nTreat every rocket launch as an expense. Treat every landing request as a contract. Treat every missing item as a supply-chain confession. If a planet depends on imported circuits, fuel, repair packs, or science ingredients, then that planet is only as strong as the cargo route feeding it.
page_mechanicist-space-age-cargo_text_2=Do not attempt to move everything everywhere. That is how novice adepts drown in inventory ghosts. Each world should export what it is uniquely good at producing and import only what it cannot reasonably make for itself. Nauvis remains the old heart. Vulcanus becomes the forge lung. Gleba becomes the biological wound that produces necessary heresies. Fulgora becomes the salvage cathedral. Aquilo becomes the cryogenic trial chamber.\n\nUse requests deliberately. Use supply limits. Build buffer storage, but do not mistake hoarding for logistics. If a landing pad fills with unsorted junk, the fault is not the pad. The fault is the priest who turned a manifest into a landfill.

menu_mechanicist-space-age-vulcanus=Vulcanus, Furnace-World of Red Iron
title_mechanicist-space-age-vulcanus=Vulcanus, Furnace-World of Red Iron
page_mechanicist-space-age-vulcanus_text_1=Vulcanus is the first great forge-world lesson. The planet is heat, lava, ash, pressure, and violence made useful. It teaches the engineer that industry does not need comfort. It needs input, output, and sufficient contempt for personal safety.\n\nThe great prize of Vulcanus is metallurgy at scale. Foundries, lava-derived resources, calcite chains, molten metal handling, and massive production throughput become the new ritual language. If Nauvis taught you to smelt ore, Vulcanus teaches you to pour the bones of a planet through pipes and call it efficiency.
page_mechanicist-space-age-vulcanus_text_2=Arriving on Vulcanus, secure power, secure mining, and respect the local threats. Demolishers are not biters with a new hat. They are territorial engines of biological refusal. Expand around them until you can kill them properly. When you do kill them, do so with planning, not optimism. Optimism is not armor.\n\nBuild foundries early. Move molten products intelligently. Use the planet's strengths rather than recreating a sad Nauvis factory with extra smoke. Vulcanus wants bulk production. Feed it bulk inputs, extract bulk outputs, and let the forge-world become the heavy industrial arm of your interplanetary machine.
page_mechanicist-space-age-vulcanus_text_3=The Mechanicus interpretation is simple: Vulcanus is not hostile. It is honest. It burns the unworthy, crushes the careless, and rewards those who understand that heat is just another conveyor if you pipe it correctly. Establish the foundry shrines. Bless the lava pumps. Record every demolished engineer as a learning opportunity for the next expendable acolyte.

menu_mechanicist-space-age-gleba=Gleba, Agri-Deathworld of Rot and Yield
title_mechanicist-space-age-gleba=Gleba, Agri-Deathworld of Rot and Yield
page_mechanicist-space-age-gleba_text_1=Gleba is where clean factory logic goes to decompose. The planet is biological, wet, unstable, fertile, and deeply rude. Its products spoil. Its enemies escalate. Its recipes often behave less like iron smelting and more like the management of a living wound.\n\nDo not bring a pure belt-bus mindset to Gleba and expect dignity. Gleba demands cycles, freshness, seeding, harvesting, spoilage handling, nutrient flow, and defensive readiness. It is not enough to make the item once. You must keep the biological process alive without allowing rot to clog the arteries.
page_mechanicist-space-age-gleba_text_2=Your primary tool is the agricultural tower. It plants and harvests. Around it you build processing that turns fruits, jelly, mash, nutrients, bacteria, and other organic insults into useful products. The spoilage timer is not flavor text. It is the planet whispering that your storage habits are sinful.\n\nBuild compact. Build with spoilage paths. Burn or consume what decays. Do not allow dead biological material to sit in systems that expect fresh input. When a line jams, ask what spoiled, where it spoiled, and why you allowed the Omnissiah to witness such laziness.
page_mechanicist-space-age-gleba_text_3=Gleba also teaches military humility. The local ecosystem responds to pollution and abuse with enthusiasm. Defenses must be fed, powered, repaired, and expanded as the factory grows. A biological factory with no defense plan is not a factory. It is a buffet with belts.\n\nThe Mechanicus lesson is that flesh can be useful, but only under constant supervision, armed perimeter walls, and aggressive processing discipline. The flesh is weak. Unfortunately, it is also an ingredient.

menu_mechanicist-space-age-fulgora=Fulgora, Tomb-Forge of Lightning and Scrap
title_mechanicist-space-age-fulgora=Tomb-Forge of Lightning and Scrap
page_mechanicist-space-age-fulgora_text_1=Fulgora is a dead industrial sermon written in scrap and lightning. It does not ask you to mine clean ore. It asks you to dig through the corpse of a prior civilization, sort the bones, and pretend this is not a warning.\n\nThe central resource is scrap. Scrap must be recycled, sorted, and recombined. This makes Fulgora feel less like a normal mining planet and more like a salvage cathedral where every output is both a gift and a sorting problem.
page_mechanicist-space-age-fulgora_text_2=Lightning is not weather here. It is infrastructure with a murderous personality. Use lightning rods and collectors to protect the factory and harvest power. Build on islands. Respect limited space. Route scrap carefully. Expect mixed outputs. Use filtering, recycling, and buffering with discipline.\n\nIf your factory backs up, the first question is not, what am I missing? The first question is, what am I producing too much of because I refused to sort the dead world's offerings correctly?
page_mechanicist-space-age-fulgora_text_3=Fulgora rewards those who understand reversal. On Nauvis you often build from raw resources upward. On Fulgora you disassemble the past downward into the future. Recyclers, electromagnetic plants, accumulators, lightning systems, and quality-related processes become central.\n\nThe Red Priests approve of Fulgora because it confirms a sacred truth: no machine truly dies while its parts can still be requisitioned.

menu_mechanicist-space-age-aquilo=Aquilo, Cryo-Shrine of Punishment
title_mechanicist-space-age-aquilo=Aquilo, Cryo-Shrine of Punishment
page_mechanicist-space-age-aquilo_text_1=Aquilo is the planet that hates insufficient preparation. It is cold, remote, brittle, and unwilling to tolerate the sort of sloppy improvisation that works elsewhere. If Vulcanus is honest heat, Aquilo is honest absence of heat.\n\nThe first doctrine of Aquilo is this: freezing is a logistics problem. Pipes, machines, and systems that require warmth must be planned around heat. Heating towers, heat pipes, chemical supply, and cryogenic processing form the spine of survival.
page_mechanicist-space-age-aquilo_text_2=Do not arrive with a pocket full of hope and a ship full of random parts. Bring what you need to bootstrap power, heat, construction, and essential processing. Aquilo punishes incomplete manifests. The planet is not impressed by your heroic struggle. It has seen better corpses.\n\nCryogenic plants and advanced cold-chain recipes unlock late-stage science and fusion-adjacent work. These are not casual toys. They are proof that your interplanetary logistics network has matured enough to feed a hostile world with exact materials at exact times.
page_mechanicist-space-age-aquilo_text_3=The Mechanicus lesson of Aquilo is discipline under constraint. Every warm tile is a defended chapel. Every working pipe is a heated artery. Every functioning machine is an insult hurled into the teeth of entropy. If something freezes, ask not why the planet betrayed you. Ask why you failed to bring sufficient fire.

menu_mechanicist-space-age-machines=New Machines and Their Proper Worship
title_mechanicist-space-age-machines=New Machines and Their Proper Worship
page_mechanicist-space-age-machines_text_1=Space Age adds machines that are not merely stronger versions of old machines. They are planetary doctrines made physical. The foundry belongs to Vulcanus and speaks in molten throughput. The biochamber belongs to Gleba and speaks in nutrients, decay, and organic transformation. The electromagnetic plant belongs to Fulgora and speaks in lightning, circuits, and salvage logic. The cryogenic plant belongs to Aquilo and speaks in cold, precision, and suffering.\n\nUse each where it belongs. Do not reduce them to decorative crafting machines. Their recipes define the reason to conquer their worlds.
page_mechanicist-space-age-machines_text_2=The asteroid collector, crusher, cargo bay, cargo landing pad, rocket silo, and thruster form the void logistics spine. Without them, your empire remains planetary. With them, resources move between worlds and the star system becomes one factory.\n\nThe heating tower, fusion reactor, fusion generator, lightning collector, and advanced power systems represent the energy doctrine of Space Age. Each is a reminder that power is not a number on a graph. Power is permission. Without power, belts stop, inserters freeze, defenses die, and the machine-spirit learns disappointment.

menu_mechanicist-space-age-science=Planetary Science and Doctrine Packs
title_mechanicist-space-age-science=Planetary Science and Doctrine Packs
page_mechanicist-space-age-science_text_1=Each planet contributes research not because the universe is tidy, but because each world teaches a different industrial sin. Vulcanus yields metallurgic doctrine. Gleba yields agricultural and biological doctrine. Fulgora yields electromagnetic and salvage doctrine. Aquilo yields cryogenic doctrine. The void yields space science and platform logistics.\n\nDo not think of science packs as colored bottles. Think of them as stamped doctrinal proofs. Each one says: this world has been understood well enough to export knowledge without immediately collapsing.
page_mechanicist-space-age-science_text_2=Interplanetary research fails when one planet starves the labs. Watch which pack runs out. That shortage is a confession written in logistics. If metallurgic science is missing, Vulcanus is underbuilt or under-shipped. If agricultural science spoils, Gleba is mocking your storage habits. If electromagnetic science stalls, Fulgora's salvage cathedral is jammed. If cryogenic science vanishes, Aquilo is frozen, unfed, or both.\n\nThe lab does not care for excuses. It consumes doctrine. Feed it.

menu_mechanicist-space-age-threats=Threats, Hazards, and Local Hostilities
title_mechanicist-space-age-threats=Threats, Hazards, and Local Hostilities
page_mechanicist-space-age-threats_text_1=Space Age hazards are not interchangeable. Nauvis has biters. Vulcanus has demolishers and hostile terrain. Gleba has aggressive biological escalation and spoilage pressure. Fulgora has lightning and constrained islands. Aquilo has cold, heat failure, and logistical starvation. The void has asteroids and platform fragility.\n\nTherefore, do not export one defense plan everywhere and call it doctrine. That is not doctrine. That is laziness in a helmet.
page_mechanicist-space-age-threats_text_2=Defend according to the planet. Vulcanus demands respect for territory and heavy weapons. Gleba demands perimeter maintenance and pollution awareness. Fulgora demands lightning protection as much as military readiness. Aquilo demands thermal continuity. Platforms demand turrets, ammunition, asteroid interception, power reliability, and enough repair capacity to survive mistakes.\n\nThe Mechanicus recognizes many forms of enemy. Some have teeth. Some have weather. Some are your own belt layouts.

menu_mechanicist-space-age-quality=Quality, Recycling, and Sacred Reclamation
title_mechanicist-space-age-quality=Quality, Recycling, and Sacred Reclamation
page_mechanicist-space-age-quality_text_1=When Quality is present, every item may become more than its base pattern. Quality is not luck. It is inspection, repetition, reclamation, and ritualized intolerance for mediocrity. Modules increase the chance of superior outputs. Recyclers return unworthy goods to the furnace of possibility.\n\nIn Mechanicus terms, the recycler is not a trash machine. It is a confessional booth for matter. Items enter guilty. Materials leave with a chance at redemption.
page_mechanicist-space-age-quality_text_2=Use quality where it matters. Do not drown the factory chasing perfect screws if the power grid is burning. Prioritize equipment, modules, space platform parts, armor, weapons, critical machines, and expensive infrastructure. Quality becomes strongest when paired with stable production loops and deliberate recycling routes.\n\nThe Omnissiah smiles upon excellence. The logistics network groans under pointless vanity.

menu_mechanicist-space-age-checklist=Interplanetary Survival Checklist
title_mechanicist-space-age-checklist=Interplanetary Survival Checklist
page_mechanicist-space-age-checklist_text_1=Before leaving Nauvis, confirm the following catechism: rockets are automated, platform parts are available, ammunition is stocked, solar or void power is sufficient, cargo requests are understood, repair materials exist, and the destination world has a bootstrap manifest.\n\nBefore trusting a planet, confirm power, resource input, waste handling, export product, local defense, storage limits, and emergency recovery. A planet that produces one miracle item but cannot restart after a shortage is not a colony. It is a shrine to overconfidence.
page_mechanicist-space-age-checklist_text_2=Before expanding the interplanetary network, confirm that each world has a role. Nauvis supplies the old foundation. Vulcanus supplies mass and metallurgy. Gleba supplies biological doctrine. Fulgora supplies salvage and electromagnetic doctrine. Aquilo supplies cryogenic doctrine. Platforms supply movement, collection, and orbital transfer.\n\nIf you cannot say what a world exports, what it imports, and what happens when shipments stop, you have not built a logistics network. You have built a superstition with rocket fuel.

menu_mechanicist-space-age-heresy=Final Martian Admonition
title_mechanicist-space-age-heresy=Final Martian Admonition
page_mechanicist-space-age-heresy_text_1=The Space Age expansion is the moment Factorio stops being a factory and becomes a crusade of systems. The novice sees planets. The adept sees supply chains. The magos sees a distributed machine whose organs are separated by vacuum and joined by rockets, platforms, doctrine, and fear.\n\nYou will fail. A platform will starve. A planet will jam. A biological line will rot. Lightning will strike something expensive. Aquilo will freeze a system you thought was stable. Vulcanus will remind you that local wildlife does not respect your schedule. These are not defeats. They are audits.
page_mechanicist-space-age-heresy_text_2=Correct the fault. Strengthen the route. Expand the shrine. Feed the labs. Burn the waste. Recycle the unworthy. Protect the machines.\n\nThe void is not empty. It is full of requirements.\n\n+++ END OF ANNEX +++\n+++ THE RED PRIESTS HAVE FOUND YOUR LOGISTICS WANTING +++

